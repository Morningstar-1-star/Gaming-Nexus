<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a14">
  <title>PlayForge · My Game Library</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root {
  --bg:           #0a0a14;
  --bg-2:         #12121f;
  --surface:      #1a1a2e;
  --surface-hl:   #252540;
  --border:       rgba(255,255,255,0.08);
  --text:         #ffffff;
  --muted:        rgba(255,255,255,0.55);
  --muted-2:      rgba(255,255,255,0.35);
  --accent:       #7c3aed;
  --accent-2:     #a855f7;
  --accent-3:     #ec4899;
  --accent-glow:  rgba(124,58,237,0.45);
  --success:      #10b981;
  --warn:         #f59e0b;
  --danger:       #ef4444;
  --gold:         #fbbf24;
  --epic:         #2a2a2a;
  --epic-2:       #0078f2;
  --steam:        #1b2838;
  --steam-2:      #66c0f4;
  --gog:          #86328a;
  --gog-2:        #ffffff;
  --nav-h:        68px;
  --spring:       cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease:         cubic-bezier(0.4, 0, 0.2, 1);
  --gradient-1:   linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #ec4899 100%);
  --gradient-epic: linear-gradient(135deg, #2a2a2a 0%, #0078f2 100%);
  --gradient-steam: linear-gradient(135deg, #1b2838 0%, #66c0f4 100%);
  --gradient-gog: linear-gradient(135deg, #86328a 0%, #ec4899 100%);
}

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
html { height: 100%; }
body { background: var(--bg); color: var(--text); height: 100%; width: 100%; overflow: hidden; }
#app { height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; }

::-webkit-scrollbar { width: 0; height: 0; }

/* ===== Animated background ===== */
.bg-glow { position: fixed; top: -200px; left: -100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 60%); pointer-events: none; z-index: 0; animation: floatGlow 8s ease-in-out infinite; }
.bg-glow.b { top: auto; bottom: -200px; left: auto; right: -100px; background: radial-gradient(circle, rgba(236,72,153,0.12) 0%, transparent 60%); animation-delay: 4s; }
.bg-glow.c { top: 40%; left: 50%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(102,192,244,0.08) 0%, transparent 60%); animation-delay: 2s; }
@keyframes floatGlow { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(40px, 40px) scale(1.1); } }

/* ===== Layout ===== */
.view-wrap { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: calc(var(--nav-h) + 16px); -webkit-overflow-scrolling: touch; position: relative; z-index: 1; }
.view-wrap::-webkit-scrollbar { display: none; }
.hide-scroll { scrollbar-width: none; -ms-overflow-style: none; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.hide-scroll::-webkit-scrollbar { display: none; }

.lc1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.lc2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* ===== Animations ===== */
@keyframes fadeUp   { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn    { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
@keyframes slideIn  { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
@keyframes slideDown{ from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shimmer  { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes spin     { to { transform: rotate(360deg); } }
@keyframes pulse    { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes blink    { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes gradient { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
@keyframes bounce   { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
@keyframes glow     { 0%, 100% { box-shadow: 0 0 20px var(--accent-glow); } 50% { box-shadow: 0 0 40px var(--accent-glow); } }
@keyframes scaleIn  { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes slideUp  { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes zoomIn   { from { transform: scale(1.1); opacity: 0; } to { transform: scale(1); opacity: 1); } }
@keyframes confetti { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(400px) rotate(720deg); opacity: 0; } }
@keyframes float    { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); } }
@keyframes shake    { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

.anim-fadeup { animation: fadeUp 0.5s var(--ease) both; }
.anim-pop    { animation: popIn 0.4s var(--spring) both; }
.anim-slide  { animation: slideIn 0.4s var(--ease) both; }
.anim-shake  { animation: shake 0.4s var(--ease) both; }

.stagger > * { animation: fadeUp 0.5s var(--ease) both; }
.stagger > *:nth-child(1) { animation-delay: 0.05s; }
.stagger > *:nth-child(2) { animation-delay: 0.10s; }
.stagger > *:nth-child(3) { animation-delay: 0.15s; }
.stagger > *:nth-child(4) { animation-delay: 0.20s; }
.stagger > *:nth-child(5) { animation-delay: 0.25s; }
.stagger > *:nth-child(6) { animation-delay: 0.30s; }
.stagger > *:nth-child(7) { animation-delay: 0.35s; }
.stagger > *:nth-child(8) { animation-delay: 0.40s; }
.stagger > *:nth-child(9) { animation-delay: 0.45s; }
.stagger > *:nth-child(10){ animation-delay: 0.50s; }
.stagger > *:nth-child(n+11){ animation-delay: 0.55s; }

/* ===== Buttons ===== */
.btn-primary  { background: var(--gradient-1); background-size: 200% 200%; color: white; font-weight: 700; border: none; border-radius: 14px; padding: 14px 22px; font-size: 15px; display: inline-flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.2s var(--spring), box-shadow 0.3s, background-position 0.5s; box-shadow: 0 4px 16px var(--accent-glow); position: relative; overflow: hidden; }
.btn-primary:hover { background-position: 100% 50%; box-shadow: 0 8px 28px var(--accent-glow); transform: translateY(-1px); }
.btn-primary:active { transform: scale(0.97); }
.btn-secondary{ background: var(--surface-hl); color: var(--text); font-weight: 600; border: 1px solid var(--border); border-radius: 14px; padding: 13px 22px; font-size: 14px; display: inline-flex; justify-content: center; align-items: center; gap: 6px; cursor: pointer; transition: all 0.2s; }
.btn-secondary:hover { background: var(--surface); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
.btn-secondary:active { transform: scale(0.97); }
.btn-epic  { background: var(--gradient-epic); color: white; font-weight: 700; border: none; border-radius: 12px; padding: 12px 20px; font-size: 14px; display: inline-flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s var(--spring); }
.btn-epic:hover { transform: translateY(-1px) scale(1.02); box-shadow: 0 8px 20px rgba(0,120,242,0.4); }
.btn-steam { background: var(--gradient-steam); color: white; font-weight: 700; border: none; border-radius: 12px; padding: 12px 20px; font-size: 14px; display: inline-flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s var(--spring); }
.btn-steam:hover { transform: translateY(-1px) scale(1.02); box-shadow: 0 8px 20px rgba(102,192,244,0.4); }
.btn-gog   { background: var(--gradient-gog); color: white; font-weight: 700; border: none; border-radius: 12px; padding: 12px 20px; font-size: 14px; display: inline-flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s var(--spring); }
.btn-gog:hover { transform: translateY(-1px) scale(1.02); box-shadow: 0 8px 20px rgba(236,72,153,0.4); }
.icon-btn   { width: 40px; height: 40px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); display: inline-flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; color: var(--text); transition: all 0.2s var(--spring); }
.icon-btn:hover { background: var(--surface-hl); transform: scale(1.05); }
.icon-btn:active { transform: scale(0.92); }
.tap { transition: transform 0.2s var(--spring); }
.tap:active { transform: scale(0.96); }

/* ===== Chips / Pills ===== */
.chip   { background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-radius: 99px; padding: 8px 16px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.2s var(--spring); display: inline-flex; align-items: center; gap: 6px; }
.chip:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
.chip.active { background: var(--text); color: #000; border-color: var(--text); box-shadow: 0 4px 12px rgba(255,255,255,0.15); }

/* ===== Input ===== */
.inp { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 13px 16px; color: var(--text); font-size: 14px; outline: none; width: 100%; transition: border-color 0.2s, box-shadow 0.2s; }
.inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
.inp::placeholder { color: var(--muted); }

textarea.inp { font-family: 'SF Mono', Monaco, monospace; font-size: 12px; resize: vertical; min-height: 120px; }

/* ===== Skeleton ===== */
.skel { background: linear-gradient(90deg, var(--surface) 0%, var(--surface-hl) 50%, var(--surface) 100%); background-size: 200% 100%; animation: shimmer 1.6s infinite; border-radius: 10px; }

/* ===== Top Header ===== */
.top-header { position: sticky; top: 0; z-index: 30; background: rgba(10,10,20,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); animation: slideDown 0.4s var(--ease) both; }
.top-header-content { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
.app-title { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; background: var(--gradient-1); background-size: 200% 200%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: gradient 4s ease infinite; }
.search-pill { flex: 1; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 9px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.2s; }
.search-pill:hover { background: var(--surface-hl); border-color: rgba(255,255,255,0.15); }
.search-pill span { color: var(--muted); font-size: 13px; font-weight: 500; }

/* ===== Bottom Nav ===== */
.nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: rgba(10,10,20,0.92); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding: 0 8px 10px; z-index: 50; animation: slideUp 0.4s var(--ease) both; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--muted); background: none; border: none; font-size: 10px; font-weight: 600; min-width: 60px; padding: 6px 4px; cursor: pointer; transition: color 0.2s, transform 0.2s var(--spring); position: relative; }
.nav-btn:active { transform: scale(0.9); }
.nav-btn.active { color: var(--text); }
.nav-btn.active::before { content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 24px; height: 3px; background: var(--gradient-1); background-size: 200% 200%; border-radius: 2px; animation: gradient 3s ease infinite; }
.nav-icon-wrap { display: flex; align-items: center; justify-content: center; transition: transform 0.3s var(--spring); }
.nav-btn.active .nav-icon-wrap { animation: bounce 1s ease infinite; }

/* ===== Hero Banner ===== */
.hero-banner { position: relative; border-radius: 20px; overflow: hidden; aspect-ratio: 16/9; margin: 16px 20px; cursor: pointer; box-shadow: 0 12px 40px rgba(0,0,0,0.5); transition: transform 0.3s var(--spring); }
.hero-banner:hover { transform: translateY(-2px); }
.hero-banner:active { transform: scale(0.98); }
.hero-banner img { width: 100%; height: 100%; object-fit: cover; display: block; animation: zoomIn 0.8s var(--ease) both; transition: transform 6s linear; }
.hero-banner:hover img { transform: scale(1.08); }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,10,20,0.3) 0%, rgba(10,10,20,0.5) 50%, rgba(10,10,20,0.95) 100%); }
.hero-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; animation: fadeUp 0.6s var(--ease) both; }
.hero-tag { display: inline-block; background: var(--accent); color: white; font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; animation: popIn 0.4s var(--spring) 0.2s both; }
.hero-title { font-size: 26px; font-weight: 900; line-height: 1.1; margin-bottom: 6px; text-shadow: 0 2px 12px rgba(0,0,0,0.7); animation: fadeUp 0.5s var(--ease) 0.1s both; }
.hero-sub { font-size: 13px; color: rgba(255,255,255,0.85); margin-bottom: 14px; animation: fadeUp 0.5s var(--ease) 0.2s both; }
.hero-cta { display: inline-flex; align-items: center; gap: 8px; background: white; color: #000; font-weight: 700; font-size: 14px; padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; transition: transform 0.2s var(--spring); animation: fadeUp 0.5s var(--ease) 0.3s both; }
.hero-cta:hover { transform: scale(1.05); }
.hero-cta:active { transform: scale(0.95); }
.hero-dots { position: absolute; bottom: 14px; right: 18px; display: flex; gap: 5px; animation: fadeIn 0.6s var(--ease) 0.4s both; }
.hero-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: all 0.3s var(--spring); cursor: pointer; }
.hero-dot.active { width: 22px; border-radius: 3px; background: white; }

/* ===== Section Header ===== */
.section { padding: 0 20px; margin-top: 32px; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
.section-title .emoji { font-size: 22px; }
.section-link { color: var(--accent-2); font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.section-link:hover { opacity: 0.8; }

/* ===== Cards ===== */
.cards-row { display: flex; gap: 14px; padding: 0 20px; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
.cards-row::-webkit-scrollbar { display: none; }
.game-card { flex-shrink: 0; width: 150px; cursor: pointer; scroll-snap-align: start; transition: transform 0.3s var(--spring); }
.game-card:hover { transform: translateY(-4px); }
.game-card-img { width: 100%; aspect-ratio: 3/4; border-radius: 16px; overflow: hidden; background: var(--surface); position: relative; margin-bottom: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
.game-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s var(--ease); }
.game-card:hover .game-card-img img { transform: scale(1.1); }
.game-card-img::after { content: ''; position: absolute; inset: 0; border-radius: 16px; border: 2px solid transparent; transition: border-color 0.3s; pointer-events: none; }
.game-card:hover .game-card-img::after { border-color: var(--accent); }
.game-card-img .badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); color: white; font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 6px; letter-spacing: 0.5px; text-transform: uppercase; animation: scaleIn 0.3s var(--spring) 0.2s both; }
.game-card-img .badge.free { background: var(--success); }
.game-card-img .badge.hot  { background: var(--danger); }
.game-card-img .badge.soon { background: var(--warn); color: #000; }
.game-card-img .badge.new  { background: var(--accent); }
.game-card-img .badge.owned { background: var(--success); }
.game-card-img .badge.wish { background: var(--gold); color: #000; }
.game-card-img .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
.game-card:hover .play-overlay { opacity: 1; }
.play-overlay-btn { width: 56px; height: 56px; border-radius: 50%; background: var(--gradient-1); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px var(--accent-glow); transform: scale(0.8); transition: transform 0.3s var(--spring); }
.game-card:hover .play-overlay-btn { transform: scale(1); }
.game-card-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; transition: color 0.2s; }
.game-card:hover .game-card-title { color: var(--accent-2); }
.game-card-meta { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
.game-card-meta .star { color: var(--gold); }

.featured-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; }
.featured-card { aspect-ratio: 1; border-radius: 16px; overflow: hidden; position: relative; cursor: pointer; background: var(--surface); transition: transform 0.3s var(--spring); }
.featured-card:hover { transform: scale(1.05); }
.featured-card:active { transform: scale(0.97); }
.featured-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s var(--ease); }
.featured-card:hover img { transform: scale(1.15); }
.featured-card .gradient { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.9) 100%); }
.featured-card .label { position: absolute; bottom: 8px; left: 8px; right: 8px; font-size: 11px; font-weight: 700; line-height: 1.2; }
.featured-card .store-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); padding: 3px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; }

.chart-item { display: flex; align-items: center; gap: 14px; padding: 12px 8px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s, transform 0.2s var(--spring); border-radius: 8px; }
.chart-item:hover { background: var(--surface); transform: translateX(4px); }
.chart-item:last-child { border-bottom: none; }
.chart-rank { font-size: 22px; font-weight: 900; color: var(--muted); width: 28px; text-align: center; font-style: italic; transition: color 0.2s; }
.chart-item:hover .chart-rank { color: var(--accent-2); }
.chart-rank.top { background: var(--gradient-1); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.chart-thumb { width: 56px; height: 56px; border-radius: 12px; overflow: hidden; flex-shrink: 0; background: var(--surface); transition: transform 0.3s var(--spring); position: relative; }
.chart-item:hover .chart-thumb { transform: scale(1.08); }
.chart-thumb img { width: 100%; height: 100%; object-fit: cover; }
.chart-thumb .mini-store { position: absolute; bottom: 2px; right: 2px; width: 16px; height: 16px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; }
.chart-info { flex: 1; min-width: 0; }
.chart-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.chart-meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.chart-cta { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 7px 16px; border-radius: 99px; font-size: 12px; font-weight: 700; cursor: pointer; flex-shrink: 0; transition: all 0.2s var(--spring); }
.chart-cta:hover { background: var(--accent); border-color: var(--accent); transform: scale(1.05); }
.chart-cta:active { transform: scale(0.95); }
.chart-cta.owned { background: var(--success); border-color: var(--success); color: white; }

/* ===== Store Filter Pills (Library) ===== */
.store-pills { display: flex; gap: 8px; padding: 0 20px; margin-bottom: 16px; overflow-x: auto; }
.store-pills::-webkit-scrollbar { display: none; }
.store-pill { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 99px; font-size: 12px; font-weight: 700; cursor: pointer; background: var(--surface); color: var(--muted); border: 1px solid var(--border); transition: all 0.2s var(--spring); white-space: nowrap; }
.store-pill:hover { transform: translateY(-1px); }
.store-pill.active { color: white; }
.store-pill[data-store="all"].active { background: var(--gradient-1); border-color: transparent; }
.store-pill[data-store="epic"].active { background: var(--gradient-epic); border-color: transparent; color: white; }
.store-pill[data-store="steam"].active { background: var(--gradient-steam); border-color: transparent; color: white; }
.store-pill[data-store="gog"].active { background: var(--gradient-gog); border-color: transparent; color: white; }

/* ===== Empty / Import states ===== */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; }
.empty-state-icon { width: 80px; height: 80px; border-radius: 24px; background: var(--surface); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; animation: bounce 2s ease infinite; }
.empty-state-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.empty-state-text { font-size: 14px; color: var(--muted); max-width: 280px; line-height: 1.5; margin-bottom: 24px; }
.import-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }
.import-btn-row { display: flex; gap: 8px; }
.import-btn-row > * { flex: 1; }

.profile-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.profile-tag { color: var(--muted); font-size: 13px; font-weight: 500; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 20px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 8px; text-align: center; transition: transform 0.2s var(--spring), border-color 0.2s; }
.stat-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.15); }
.stat-value { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 2px; }
.stat-value.success { color: var(--success); }
.stat-value.warn { color: var(--warn); }
.stat-value.gold { color: var(--gold); }
.stat-label { font-size: 9px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }

.menu-section { background: var(--surface); margin: 0 20px 16px; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
.menu-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; cursor: pointer; transition: background 0.2s, transform 0.2s var(--spring); border-bottom: 1px solid var(--border); }
.menu-item:last-child { border-bottom: none; }
.menu-item:hover { background: var(--surface-hl); transform: translateX(4px); }
.menu-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--surface-hl); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.menu-text { flex: 1; font-size: 14px; font-weight: 600; }
.menu-arrow { color: var(--muted-2); transition: transform 0.2s; }
.menu-item:hover .menu-arrow { transform: translateX(4px); color: var(--accent-2); }

/* ===== Detail Page ===== */
.detail-wrap { position: fixed; inset: 0; overflow-y: auto; background: var(--bg); z-index: 70; -webkit-overflow-scrolling: touch; padding-bottom: 40px; }
.detail-wrap::-webkit-scrollbar { display: none; }
.detail-hero { position: relative; width: 100%; aspect-ratio: 16/10; overflow: hidden; }
.detail-hero img { width: 100%; height: 100%; object-fit: cover; animation: zoomIn 0.8s var(--ease) both; transition: transform 8s linear; }
.detail-hero-grad { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,10,20,0.3) 0%, transparent 30%, transparent 60%, var(--bg) 100%); }
.detail-nav-btns { position: absolute; top: 50px; left: 16px; right: 16px; display: flex; justify-content: space-between; animation: slideDown 0.4s var(--ease) both; }
.detail-nav-btns .icon-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.detail-info-block { padding: 0 20px; margin-top: -32px; position: relative; animation: fadeUp 0.5s var(--ease) 0.2s both; }
.detail-title { font-size: 30px; font-weight: 900; letter-spacing: -0.5px; line-height: 1.15; margin-bottom: 8px; }
.detail-developer { font-size: 14px; color: var(--muted); margin-bottom: 16px; }
.detail-developer span { color: var(--text); font-weight: 600; }
.detail-stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.detail-stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; flex: 1; min-width: 90px; transition: transform 0.2s var(--spring), border-color 0.2s; }
.detail-stat-pill:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.15); }
.detail-stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 4px; }
.detail-stat-value { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 4px; }
.detail-stat-value.gold { color: var(--gold); }
.detail-stat-value.success { color: var(--success); }
.detail-cta-row { display: flex; gap: 10px; margin-bottom: 16px; }
.detail-cta-row .btn-primary { flex: 1; }
.detail-cta-row .btn-secondary { width: 50px; flex-shrink: 0; padding: 0; }
.ownership-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.ownership-bar.owned { border-color: var(--success); background: rgba(16,185,129,0.08); }
.ownership-bar .check { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ownership-bar.owned .check { background: var(--success); }
.ownership-bar .text { flex: 1; }
.ownership-bar .text strong { display: block; font-size: 13px; margin-bottom: 2px; }
.ownership-bar .text small { font-size: 11px; color: var(--muted); }

.detail-section { padding: 0 20px; margin-bottom: 28px; animation: fadeUp 0.5s var(--ease) both; }
.detail-section h3 { font-size: 17px; font-weight: 800; margin-bottom: 12px; }
.detail-desc { font-size: 14px; line-height: 1.65; color: rgba(255,255,255,0.78); }

.screenshot-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
.screenshot-row::-webkit-scrollbar { display: none; }
.screenshot { height: 160px; border-radius: 12px; object-fit: cover; flex-shrink: 0; cursor: pointer; transition: transform 0.3s var(--spring); }
.screenshot:hover { transform: scale(1.05); }

.video-thumb { height: 180px; min-width: 280px; border-radius: 12px; overflow: hidden; position: relative; flex-shrink: 0; cursor: pointer; background: var(--surface); transition: transform 0.3s var(--spring); }
.video-thumb:hover { transform: scale(1.05); }
.video-thumb img { width: 100%; height: 100%; object-fit: cover; }
.video-thumb .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); }
.video-thumb .play-circle { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; }

.addon-list { display: flex; flex-direction: column; gap: 8px; }
.addon-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; transition: all 0.2s; }
.addon-item:hover { background: var(--surface-hl); border-color: rgba(255,255,255,0.12); }
.addon-thumb { width: 48px; height: 48px; border-radius: 8px; background: var(--bg-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; }

.addon-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.addon-meta { font-size: 11px; color: var(--muted); }

.addon-status.missing { background: rgba(239,68,68,0.15); color: var(--danger); }

.rating-summary { display: flex; align-items: center; gap: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
.rating-big { font-size: 56px; font-weight: 900; line-height: 1; color: var(--gold); }
.rating-text { font-size: 13px; color: var(--muted); margin-top: 4px; }
.rating-bars { flex: 1; }
.rating-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.rating-bar-row span:first-child { font-size: 12px; color: var(--muted); width: 12px; }
.rating-bar { flex: 1; height: 6px; background: var(--surface-hl); border-radius: 3px; overflow: hidden; }

.platforms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
.platform-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.2s var(--spring); }

.settings-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 14px; animation: fadeUp 0.4s var(--ease) both; transition: border-color 0.2s; }

.status-pill.offline .dot { background: var(--danger); }

.msg-think span:nth-child(2) { animation-delay: 0.2s; }
.msg-think span:nth-child(3) { animation-delay: 0.4s; }

.spinner { width: 18px; height: 18px; border: 2.5px solid rgba(124,58,237,0.25); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }

.stream-player { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; flex-shrink: 0; }
.stream-player iframe { width: 100%; height: 100%; border: none; display: block; }
.stream-overlay { position: absolute; top: 0; left: 0; right: 0; padding: 50px 16px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 2; }
.stream-overlay .icon-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); }
.stream-live-badge { background: var(--danger); color: white; font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 6px; display: flex; align-items: center; gap: 5px; animation: pulse 1.5s infinite; }
.stream-live-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: white; animation: blink 1.2s infinite; }
.stream-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
.stream-body::-webkit-scrollbar { display: none; }

/* ===== Toast ===== */
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 600; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: slideDown 0.3s var(--spring) both; white-space: nowrap; max-width: 90%; }
.toast.fade-out { opacity: 0; transition: opacity 0.3s; }
.toast.success { background: var(--success); color: white; }
.toast.error { background: var(--danger); color: white; }

/* ===== Modal overlay (for import dialog) ===== */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 150; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.2s var(--ease) both; }
.dialog { background: var(--bg-2); border: 1px solid var(--border); border-radius: 20px; max-width: 500px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; animation: popIn 0.3s var(--spring) both; }
.dialog-hdr { padding: 20px 20px 0; display: flex; justify-content: space-between; align-items: center; }
.dialog-hdr h3 { font-size: 18px; font-weight: 800; }
.dialog-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
.dialog-body::-webkit-scrollbar { display: none; }
.dialog-foot { padding: 16px 20px 20px; display: flex; gap: 10px; }
.dialog-foot > * { flex: 1; }

/* ===== Confetti ===== */
.confetti-piece { position: fixed; width: 10px; height: 10px; pointer-events: none; z-index: 300; animation: confetti 2.5s ease-out forwards; }

/* ===== Mobile ===== */
@media (min-width: 768px) {
  #app { max-width: 480px; margin: 0 auto; box-shadow: 0 0 60px rgba(0,0,0,0.5); }
  .nav-bar { max-width: 480px; left: 50%; transform: translateX(-50%); }
}

  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  el.innerHTML = ICONS[name] || '';
  return el;
};

const fetchRAWG = async (endpoint) => {
  try {
    const sep = endpoint.includes('?') ? '&' : '?';
    const res = await fetch(`https://api.rawg.io/api/${endpoint}${sep}key=${RAWG_KEY}`);
    if (!res.ok) throw new Error('RAWG ' + res.status);
    const data = await res.json();
    return data.results || data;
  } catch (e) { console.warn('RAWG:', e); return []; }
};

const loadData = async () => {
  const today = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  const ago30  = fmt(new Date(today.getTime() - 30*864e5));
  const ago90  = fmt(new Date(today.getTime() - 90*864e5));
  const ago180 = fmt(new Date(today.getTime() - 180*864e5));
  const ago365 = fmt(new Date(today.getTime() - 365*864e5));
  const next180= fmt(new Date(today.getTime() + 180*864e5));

  try {
    const [hero, fresh, newG, upcoming, free, updated, action, rpg, shooter, racing, indie, strategy, pop2024] = await Promise.all([
      fetchRAWG(`games?ordering=-rating&page_size=8&dates=${ago365},${fmt(today)}`),
      fetchRAWG(`games?dates=${ago30},${fmt(today)}&ordering=-rating&page_size=12`),
      fetchRAWG(`games?dates=${ago90},${fmt(today)}&ordering=-added&page_size=15`),
      fetchRAWG(`games?dates=${fmt(today)},${next180}&ordering=-added&page_size=10`),
      fetchRAWG(`games?tags=free-to-play&ordering=-added&page_size=10`),
      fetchRAWG(`games?dates=${ago180},${fmt(today)}&ordering=-updated&page_size=12`),
      fetchRAWG(`games?genres=action&dates=${ago365},${fmt(today)}&ordering=-rating&page_size=10`),
      fetchRAWG(`games?genres=role-playing-games-rpg&dates=${ago365},${fmt(today)}&ordering=-rating&page_size=10`),
      fetchRAWG(`games?genres=shooter&dates=${ago365},${fmt(today)}&ordering=-rating&page_size=10`),
      fetchRAWG(`games?genres=racing&dates=${ago365},${fmt(today)}&ordering=-rating&page_size=10`),
      fetchRAWG(`games?genres=indie&dates=${ago365},${fmt(today)}&ordering=-rating&page_size=10`),
      fetchRAWG(`games?genres=strategy&dates=${ago365},${fmt(today)}&ordering=-rating&page_size=10`),
      fetchRAWG(`games?dates=2024-01-01,2024-12-31&ordering=-added&page_size=10`),
    ]);

    const shuffled = [...hero].filter(g => g.background_image).sort(() => Math.random() - 0.5);
    state.data.hero = shuffled;
    state.data.featured = fresh.filter(g => g.background_image).slice(0, 6);
    state.data.newReleases = newG.filter(g => g.background_image);
    state.data.upcoming = upcoming.filter(g => g.background_image);
    state.data.freeGames = free.filter(g => g.background_image);
    state.data.recentlyUpdated = updated.filter(g => g.background_image);
    state.data.action = action.filter(g => g.background_image);
    state.data.rpg = rpg.filter(g => g.background_image);
    state.data.shooter = shooter.filter(g => g.background_image);
    state.data.racing = racing.filter(g => g.background_image);
    state.data.indie = indie.filter(g => g.background_image);
    state.data.strategy = strategy.filter(g => g.background_image);
    state.data.popular2024 = pop2024.filter(g => g.background_image);

    const seen = new Set();
    state.data.top = [...newG, ...pop2024].filter(g => {
      if (!g.background_image || seen.has(g.id)) return false;
      seen.add(g.id);
      return true;
    }).slice(0, 20);
  } catch(e) { console.warn('loadData:', e); }
  state.loading = false;
  startHeroRotation();
  render();
};

const startHeroRotation = () => {
  if (state.heroTimer) clearInterval(state.heroTimer);
  if (state.data.hero.length < 2) return;
  state.heroTimer = setInterval(() => {
    state.heroIndex = (state.heroIndex + 1) % state.data.hero.length;
    updateHero();
  }, 5000);
};

const updateHero = () => {
  const heroEl = document.getElementById('hero-banner');
  if (!heroEl) return;
  const g = state.data.hero[state.heroIndex];
  if (!g) return;
  const img = heroEl.querySelector('img');
  if (img) { img.style.animation = 'none'; img.offsetHeight; img.style.animation = 'zoomIn 0.6s var(--ease)'; img.src = g.background_image; }
  heroEl.querySelector('.hero-tag').textContent = (g.genres?.[0]?.name || 'FEATURED').toUpperCase();
  heroEl.querySelector('.hero-title').textContent = g.name;
  heroEl.querySelector('.hero-sub').textContent = g.released ? `${g.released} • ★ ${g.rating || '4.5'}/5` : 'Featured this week';
  heroEl.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === state.heroIndex));
};

const searchGame = async (query) => {

const askAI = async (userMsg) => {
  const key = storage.get('cfg')?.openrouter_key;
  if (!key) return "⚠️ No API key found. Tap Profile → Settings → API Key to add your OpenRouter key and unlock me.";
  const sysPrompt = `You are Forge, a sharp, friendly gaming co-pilot inside an app store called PlayForge. You give concise, useful advice on games, builds, lore, mechanics, recommendations, and what to play next. Keep answers punchy (under 200 words unless asked for detail). Use gaming terminology naturally.`;
  const msgs = [
    { role: 'system', content: sysPrompt },
    ...state.chatHistory.filter(m => m.role === 'user' || m.role === 'assistant').slice(-10).map(m => ({ role: m.role, content: m.content })),
    { role: 'user', content: userMsg }
  ];
  try {
    const res = await fetch(OPENROUTER_URL, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json', 'HTTP-Referer': 'https://playforge.app', 'X-Title': 'PlayForge' },
      body: JSON.stringify({ model: 'google/gemini-2.5-flash', messages: msgs, max_tokens: 600 })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      return `❌ API error ${res.status}: ${err.error?.message || 'Check your key in Settings.'}`;
    }
    const data = await res.json();
    return data.choices?.[0]?.message?.content || 'No response — try again.';
  } catch (e) {
    return '❌ Network error. Check your connection.';
  }
};

// =========================================================================
// DOM HELPERS
// =========================================================================
const h = (tag, props = {}, ...children) => {
  const el = document.createElement(tag);
  if (props == null || typeof props !== 'object' || Array.isArray(props) || props instanceof Node) {
    children = [props, ...children].filter(x => x != null && x !== false);
    props = {};
  }
  for (const k in props) {
    if (k.startsWith('on') && typeof props[k] === 'function') {
      el.addEventListener(k.slice(2).toLowerCase(), props[k]);
    } else if (k === 'style' && typeof props[k] === 'object') {
      Object.assign(el.style, props[k]);
    } else if (k === 'cls') {
      el.className = props[k];
    } else if (props[k] != null && props[k] !== false) {
      el.setAttribute(k, props[k]);
    }
  }
  const flat = children.flat(Infinity);
  flat.forEach(c => {
    if (c == null || c === false) return;
    if (c instanceof Node) { el.append(c); return; }
    if (typeof c === 'string' || typeof c === 'number') { el.appendChild(document.createTextNode(String(c))); return; }
    console.warn('h() got non-Node object as child:', c);
  });
  return el;
};
const el = (tag) => (a, ...rest) => {
  if (a == null) return h(tag);
  if (typeof a === 'string') return h(tag, { cls: a }, ...rest);
  return h(tag, a, ...rest);
};
const div  = el('div');
const span = el('span');
const p    = el('p');

const showToast = (msg, type = 'default') => {
  state.toast = msg;
  state.toastType = type;
  renderToast();
  setTimeout(() => { state.toast = null; renderToast(); }, 2000);
};

const renderToast = () => {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  if (!state.toast) return;
  const t = div({ cls: 'toast' + (state.toastType !== 'default' ? ' ' + state.toastType : '') }, state.toast);
  document.getElementById('app').appendChild(t);
  setTimeout(() => t.classList.add('fade-out'), 1700);
};

const confetti = () => {

  for (let i = 0; i < 40; i++) {
    const piece = div({ style: {

  if (state.view === 'stream')   { root.append(ViewStream());   return; }

  root.append(TopHeader());

const handleFileImport = (e, store) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    const text = reader.result;
    let titles = [];
    try {
      if (file.name.endsWith('.json')) {
        const data = JSON.parse(text);
        // Try common Epic manifest format
        if (data.catalogItems) {
          titles = data.catalogItems.map(i => i.appName).filter(Boolean);
        } else if (Array.isArray(data)) {
          titles = data.map(i => typeof i === 'string' ? i : i.name || i.title || i.appName).filter(Boolean);
        } else if (data.games) {
          titles = data.games.map(i => i.name || i.title).filter(Boolean);
        }
      } else {
        // CSV or TXT: one per line
        titles = text.split(/[\n\r]+/).map(l => l.trim()).filter(l => l && !l.match(/^[,;"]/));
      }
    } catch (err) {
      showToast('Could not parse file. Try pasting manually.', 'error');
      return;
    }
    if (!titles.length) { showToast('No game titles found in file', 'error'); return; }
    await importTitles(titles, store);
  };
  reader.readAsText(file);
};

const importFromText = async (store) => {
  const text = document.getElementById('import-text')?.value?.trim();
  if (!text) { showToast('Paste your games first', 'error'); return; }
  let titles = [];
  try {
    if (text.startsWith('{') || text.startsWith('[')) {
      const data = JSON.parse(text);
      if (data.catalogItems) titles = data.catalogItems.map(i => i.appName).filter(Boolean);
      else if (Array.isArray(data)) titles = data.map(i => typeof i === 'string' ? i : i.name).filter(Boolean);
      else if (data.games) titles = data.games.map(i => i.name).filter(Boolean);
    } else {
      titles = text.split(/[\n\r]+/).map(l => l.replace(/^[-•*]\s*/, '').trim()).filter(Boolean);
    }
  } catch {
    showToast('Could not parse. One per line works best.', 'error');
    return;
  }
  if (!titles.length) { showToast('No titles detected', 'error'); return; }
  await importTitles(titles, store);
};

const importTitles = async (titles, store) => {
  showToast(`Importing ${titles.length} games from ${store.toUpperCase()}...`);
  // Dedupe
  const existing = new Set(state.owned[store].map(g => g.name.toLowerCase()));
  const toAdd = titles.filter(t => !existing.has(t.toLowerCase()));
  showToast(`Enriching ${toAdd.length} new games with cover art...`);

  // Enrich with RAWG metadata (limit concurrent requests)
  const enriched = [];
  for (let i = 0; i < toAdd.length; i++) {
    const title = toAdd[i];
    const rawg = await searchGame(title);
    enriched.push({
      name: title,
      _store: store,
      _rawgId: rawg?.id,
      background_image: rawg?.background_image || null,
      rating: rawg?.rating || null,
      released: rawg?.released || null,
      genres: rawg?.genres || [],
      addedAt: Date.now(),
    });
    // Update toast every 5
    if ((i + 1) % 5 === 0) showToast(`Enriched ${i + 1}/${toAdd.length}...`);
    // Be nice to the API
    if (i < toAdd.length - 1) await new Promise(r => setTimeout(r, 150));
  }

  state.owned[store] = [...enriched, ...state.owned[store]];
  saveOwned(store);
  showToast(`✓ Imported ${enriched.length} games to ${store.toUpperCase()}!`, 'success');
  confetti();
  state.view = null;
  state.tab = 'library';
  state.libraryFilter = store;
  state.libraryTab = 'owned';
  render();
};

const quickAdd = async (store) => {
  const gameName = document.getElementById('quick-game')?.value?.trim();
  const addonsText = document.getElementById('quick-addons')?.value?.trim() || '';
  if (!gameName) { showToast('Enter a game title', 'error'); return; }
  const addons = addonsText ? addonsText.split(',').map(s => s.trim()).filter(Boolean) : [];
  const rawg = await searchGame(gameName);
  const game = {
    name: gameName,
    _store: store,
    _rawgId: rawg?.id,
    background_image: rawg?.background_image || null,
    rating: rawg?.rating || null,
    released: rawg?.released || null,
    genres: rawg?.genres || [],
    addons: addons,
    addedAt: Date.now(),
  };
  state.owned[store].unshift(game);
  saveOwned(store);
  showToast(`✓ Added ${gameName}${addons.length ? ` with ${addons.length} add-on${addons.length > 1 ? 's' : ''}` : ''}!`, 'success');
  confetti();
  document.getElementById('quick-game').value = '';
  document.getElementById('quick-addons').value = '';

};

const ViewSearch = () => {
  const wrap = div({ cls: 'view-wrap anim-fadeup search-wrap' });

    svg('search', 18),
    h('input', { cls: 'inp', id: 'search-inp', placeholder: 'Search games, genres, devs...', value: state.search.query, autocomplete: 'off' })
  ));

  const filtersWrap = div({ cls: 'filter-chips' });
  const filterCats = [
    { id: 'all', label: 'All' },
    { id: 'action', label: 'Action' },
    { id: 'role-playing-games-rpg', label: 'RPG' },
    { id: 'shooter', label: 'Shooter' },
    { id: 'racing', label: 'Racing' },
    { id: 'indie', label: 'Indie' },
    { id: 'strategy', label: 'Strategy' },
  ];
  filterCats.forEach(c => {
    const chip = div({ cls: 'chip tap' + (c.id === state.search.category ? ' active' : ''), onClick: () => { state.search.category = c.id; render(); runSearch(); } }, c.label);
    filtersWrap.append(chip);
  });
  wrap.append(filtersWrap);

  const results = div({ id: 'search-results' });

  const renderResults = (list) => {
    results.innerHTML = '';
    if (state.search.loading) {
      for (let i = 0; i < 5; i++) {
        results.append(div({ cls: 'search-result' },
          div({ cls: 'skel', style: { width: '60px', height: '60px', borderRadius: '10px', flexShrink: 0 } }),
          div({ style: { flex: 1 } },
            div({ cls: 'skel', style: { height: '14px', width: '70%', marginBottom: '8px' } }),
            div({ cls: 'skel', style: { height: '12px', width: '40%' } })
          )
        ));
      }
      return;
    }
    if (!list.length) {
      if (state.search.query.length >= 2) {
        results.append(div({ style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)' } }, 'No results found.'));
      } else {
        results.append(div({ style: { fontSize: '13px', color: 'var(--muted)', marginBottom: '12px', fontWeight: 600 } }, '🔥 Trending searches'));
        const trending = ['Hollow Knight: Silksong', 'Black Myth: Wukong', 'Stardew Valley', 'Helldivers 2', 'Palworld'];
        trending.forEach(t => {
          const row = div({ cls: 'search-result tap' },
            div({ style: { width: '60px', height: '60px', borderRadius: '10px', background: 'var(--surface-hl)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 } }, svg('fire', 24, { color: 'var(--warn)' })),
            div({ cls: 'search-result-info' },
              div({ cls: 'search-result-title' }, t),
              div({ cls: 'search-result-meta' }, 'Trending now')
            )
          );
          row.addEventListener('click', () => {
            const inp = document.getElementById('search-inp');
            if (inp) { inp.value = t; state.search.query = t; runSearch(); }
          });
          results.append(row);
        });
      }
      return;
    }
    list.forEach((g) => {
      const row = div({ cls: 'search-result tap' });
      row.addEventListener('click', () => openDetail(g));
      row.append(h('img', { src: g.background_image || '', alt: g.name, loading: 'lazy' }));
      row.append(div({ cls: 'search-result-info' },
        div({ cls: 'search-result-title' }, g.name),
        div({ cls: 'search-result-meta' },
          (g.genres?.map(x => x.name).slice(0, 2).join(' • ') || 'Game'),
          g.rating ? span({ style: { color: 'var(--gold)' } }, '  ★ ' + g.rating) : null,
          isOwned(g.name) ? span({ style: { color: 'var(--success)' } }, '  ✓ Owned') : null
        )
      ));
      const cta = isOwned(g.name) 
        ? h('button', { cls: 'chart-cta owned' }, svg('check', 12), 'OWNED')
        : h('button', { cls: 'chart-cta tap' }, 'GET');
      if (!isOwned(g.name)) cta.addEventListener('click', (e) => { e.stopPropagation(); addToWishlist(g); });
      row.append(cta);
      results.append(row);
    });
  };

  renderResults(state.search.results);
  wrap.append(results);

  let debounce;
  const runSearch = async () => {
    const q = state.search.query.trim();
    if (q.length < 2) { state.search.results = []; renderResults([]); return; }
    state.search.loading = true;
    renderResults([]);
    clearTimeout(debounce);
    debounce = setTimeout(async () => {
      let endpoint = `games?search=${encodeURIComponent(q)}&page_size=20`;
      if (state.search.category !== 'all') endpoint += `&genres=${state.search.category}`;
      const data = await fetchRAWG(endpoint);
      state.search.results = data;
      state.search.loading = false;
      renderResults(data);
    }, 350);
  };

  setTimeout(() => {
    const inp = document.getElementById('search-inp');
    if (!inp) return;
    inp.addEventListener('input', (e) => { state.search.query = e.target.value; runSearch(); });
    if (state.search.query) inp.focus();
  }, 50);

  return wrap;
};

    div('detail-hero-grad'),
    div({ cls: 'detail-nav-btns' },
      h('button', { cls: 'icon-btn tap', onClick: () => { state.view = null; render(); } }, svg('back', 20, { color: 'white' })),
      h('button', { cls: 'icon-btn tap', onClick: () => { state.view = 'chat'; render(); } }, svg('bot', 20, { color: 'white' }))
    )
  ));

  // Info
  const info = div({ cls: 'detail-info-block' },
    h('h1', { cls: 'detail-title' }, g.name)
  );
  if (g.developers?.[0]) {
    info.append(div({ cls: 'detail-developer' }, 'By ', h('span', {}, g.developers[0].name)));
  } else if (g.publishers?.[0]) {
    info.append(div({ cls: 'detail-developer' }, 'Published by ', h('span', {}, g.publishers[0].name)));
  } else if (g.genres?.length) {
    info.append(div({ cls: 'detail-developer' }, h('span', {}, g.genres.map(x => x.name).join(' • '))));
  }

  // Ownership bar
  if (isOwn) {
    const storeColor = ownedStore === 'epic' ? '#0078f2' : ownedStore === 'steam' ? '#66c0f4' : '#86328a';
    const storeLabel = ownedStore === 'epic' ? 'Epic Games' : ownedStore === 'steam' ? 'Steam' : 'GOG';
    info.append(div({ cls: 'ownership-bar owned' },
      div({ cls: 'check' }, svg('check', 14, { color: 'white', 'stroke-width': '3' })),
      div({ cls: 'text' },
        h('strong', {}, '✓ You own this game'),
        h('small', {}, `Library: ${storeLabel}`)
      )
    ));
  }

  // Stats
  const stats = div({ cls: 'detail-stats' });
  if (g.rating) {
    stats.append(div({ cls: 'detail-stat-pill' },
      div({ cls: 'detail-stat-label' }, 'Rating'),
      div({ cls: 'detail-stat-value gold' }, svg('star', 14, { color: 'var(--gold)' }), String(g.rating) + '/5')
    ));
  }
  if (g.released) {
    stats.append(div({ cls: 'detail-stat-pill' },
      div({ cls: 'detail-stat-label' }, 'Released'),
      div({ cls: 'detail-stat-value' }, g.released.slice(0, 4))
    ));
  }
  if (g.playtime) {
    stats.append(div({ cls: 'detail-stat-pill' },
      div({ cls: 'detail-stat-label' }, 'Avg Playtime'),
      div({ cls: 'detail-stat-value' }, g.playtime + 'h')
    ));
  }
  info.append(stats);

  // CTA row
  const ctaRow = div({ cls: 'detail-cta-row' });
  if (isOwn) {
    const playBtn = h('button', { cls: 'btn-primary', style: { flex: 1 }, onClick: () => launchGame(g) },
      svg('play', 18), 'Play Now'
    );
    ctaRow.append(playBtn);
  } else {
    ctaRow.append(h('button', { cls: 'btn-primary tap', style: { flex: 1 }, onClick: () => { addToWishlist(g); } },
      wish ? svg('check', 18) : svg('heart', 18), wish ? 'In Wishlist' : 'Add to Wishlist'
    ));
  }
  if (isOwn) {
    const removeBtn = h('button', { cls: 'btn-secondary tap', onClick: () => removeFromOwned(g) },
      svg('trash', 18, { color: 'var(--danger)' })
    );
    ctaRow.append(removeBtn);
  } else {
    ctaRow.append(h('button', { cls: 'btn-secondary tap', onClick: () => toggleVault(g) },
      svg('heart', 18, { fill: wish ? 'var(--gold)' : 'none', color: wish ? 'var(--gold)' : 'currentColor' })
    ));
  }
  info.append(ctaRow);

  // Stream button
  info.append(h('button', { cls: 'btn-secondary tap', style: { width: '100%', marginBottom: '20px' }, onClick: () => { state.view = 'stream'; render(); } },
    svg('twitch', 16, { color: 'var(--accent-3)' }), 'Watch Live Streams'
  ));

  wrap.append(info);

  // Description
  const desc = (g.description_raw || g.description || '').replace(/<[^>]+>/g, '').trim()
    || `${g.name} is a ${g.genres?.[0]?.name || 'popular'} game with a ${g.rating || 'high'}/5 rating.`;
  wrap.append(div({ cls: 'detail-section' },
    h('h3', {}, 'About'),
    h('p', { cls: 'detail-desc' }, desc.slice(0, 320) + (desc.length > 320 ? '...' : ''))
  ));

  // Add-ons (only for owned games)
  if (isOwn && g.addons?.length) {
    wrap.append(div({ cls: 'detail-section' },
      h('h3', {}, span({ style: { fontSize: '20px', marginRight: '6px' } }, '🧩'), 'Your Add-ons'),
      div({ cls: 'addon-list' },
        ...g.addons.map(addon => div({ cls: 'addon-item' },
          div({ cls: 'addon-thumb' }, '🧩'),
          div({ cls: 'addon-info' },
            div({ cls: 'addon-name' }, addon),
            div({ cls: 'addon-meta' }, 'DLC / Add-on')
          ),
          div({ cls: 'addon-status owned' }, '✓ Owned')
        ))
      )
    ));
  }

  // For owned games, also show what add-ons you MIGHT be missing (suggestion)
  if (isOwn && g.dlcCount) {
    wrap.append(div({ cls: 'detail-section' },
      h('h3', {}, 'Available Add-ons'),
      p({ style: { color: 'var(--muted)', fontSize: '13px', marginBottom: '12px' } },
        `${g.dlcCount} add-on${g.dlcCount > 1 ? 's' : ''} available. Check the store to see what you're missing.`
      ),
      h('button', { cls: 'btn-secondary tap', style: { width: '100%' }, onClick: () => showToast('Browse store to find add-ons', 'success') },
        svg('external', 16), 'Browse Add-ons'
      )
    ));
  }

  // Screenshots
  if (g.short_screenshots?.length > 1) {
    wrap.append(div({ cls: 'detail-section' },
      h('h3', {}, 'Screenshots'),
      div({ cls: 'screenshot-row' },
        ...g.short_screenshots.slice(0, 8).map(s => h('img', { cls: 'screenshot', src: s.image, alt: '', loading: 'lazy' }))
      )
    ));
  }

  // Video clips section
  if (g.clip?.clip || g.short_screenshots?.length) {
    wrap.append(div({ cls: 'detail-section' },
      h('h3', {}, 'Videos & Trailers'),
      div({ cls: 'screenshot-row' },
        // First one: trailer placeholder
        div({ cls: 'video-thumb' },
          h('img', { src: g.background_image, loading: 'lazy' }),
          div({ cls: 'play-icon' }, div({ cls: 'play-circle' }, svg('play', 24, { color: '#000' })))
        ),
        ...(g.short_screenshots?.slice(0, 3).map(s => div({ cls: 'video-thumb' },
          h('img', { src: s.image, loading: 'lazy' }),
          div({ cls: 'play-icon' }, div({ cls: 'play-circle' }, svg('video', 18, { color: '#000' })))
        )) || [])
      )
    ));
  }

  // Rating summary
  if (g.rating) {
    const rating = g.rating;
    const full = Math.round(rating);
    wrap.append(div({ cls: 'detail-section' },
      h('h3', {}, 'Ratings & Reviews'),
      div({ cls: 'rating-summary' },
        div({},
          div({ cls: 'rating-big' }, String(rating)),
          div({ cls: 'rating-text' }, 'out of 5')
        ),
        div({ cls: 'rating-bars' },
          ...[5, 4, 3, 2, 1].map((star) => {
            const pct = star === full ? 65 : star === Math.max(full - 1, 1) ? 20 : 5;
            return div({ cls: 'rating-bar-row' },
              h('span', {}, String(star)),
              div({ cls: 'rating-bar' }, div({ cls: 'rating-bar-fill', style: { width: pct + '%' } }))
            );
          })
        )
      )
    ));
  }

  // Tags
  if (g.tags?.length) {
    wrap.append(div({ cls: 'detail-section' },
      h('h3', {}, 'Tags'),
      div({ cls: 'tags-row' },
        ...g.tags.slice(0, 12).map(t => div({ cls: 'tag' }, t.name))
      )
    ));
  }

  // Platforms
  if (g.platforms?.length) {
    wrap.append(div({ cls: 'detail-section' },
      h('h3', {}, 'Available On'),
      div({ cls: 'platforms-grid' },
        ...g.platforms.slice(0, 8).map(p => div({ cls: 'platform-pill' }, svg('game', 14, { color: 'var(--accent)' }), p.platform.name))
      )
    ));
  }

  return wrap;
};

const launchGame = (g) => {
  // Try to open the appropriate launcher / store page
  const store = getOwningStore(g.name);
  let url = null;
  if (store === 'epic') url = 'https://store.epicgames.com/';
  else if (store === 'steam') url = 'steam://run/' + (g._rawgId || '');
  else if (store === 'gog') url = 'https://www.gog.com/';
  
  if (url) {
    showToast(`Launching ${g.name} via ${store.toUpperCase()}...`, 'success');
    setTimeout(() => window.open(url, '_blank'), 300);
  } else {
    showToast('No launcher available', 'error');
  }
};

const removeFromOwned = (g) => {
  if (!confirm(`Remove "${g.name}" from your library?`)) return;
  ['epic', 'steam', 'gog'].forEach(store => {
    state.owned[store] = state.owned[store].filter(x => x.name.toLowerCase() !== g.name.toLowerCase());
    saveOwned(store);
  });
  showToast(`Removed ${g.name}`, 'success');
  state.view = null;
  render();
};

// =========================================================================
// STREAM VIEW
// =========================================================================
const ViewStream = () => {
  const g = state.activeGame;
  const wrap = div({ cls: 'stream-wrap anim-pop' });
  const player = div('stream-player');
  const host = window.location.hostname || 'localhost';
  const gameName = encodeURIComponent(g?.name || 'gaming');
  player.append(h('iframe', { src: `https://player.twitch.tv/?game=${gameName}&parent=${host}&muted=true`, allowfullscreen: 'true' }));
  player.append(div({ cls: 'stream-overlay' },
    h('button', { cls: 'icon-btn tap', onClick: () => { state.view = 'detail'; render(); } }, svg('back', 20, { color: 'white' })),
    div({ cls: 'stream-live-badge' }, div({ cls: 'dot' }), 'LIVE')
  ));
  wrap.append(player);

  const body = div('stream-body');
  body.append(h('h2', { style: { fontSize: '20px', fontWeight: '800', marginBottom: '6px' } }, g?.name || 'Loading...'));
  body.append(p({ style: { color: 'var(--muted)', fontSize: '13px', marginBottom: '20px' } }, '146K viewers • Streaming now'));

  ['xQc', 'Shroud', 'Pokimane', 'Summit1g'].forEach((streamer) => {
    body.append(div({ cls: 'chart-item' },
      div({ style: { width: '48px', height: '48px', borderRadius: '50%', background: 'var(--surface)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '20px', flexShrink: 0 } }, '🎥'),
      div({ cls: 'chart-info' },
        div({ cls: 'chart-name' }, streamer),
        div({ cls: 'chart-meta' }, span({ style: { color: 'var(--danger)' } }, '● '), 'Live now')
      ),
      h('button', { cls: 'btn-primary tap', style: { padding: '8px 16px', fontSize: '12px' } }, 'Watch')
    ));
  });
  wrap.append(body);
  return wrap;
};

// =========================================================================
// AI CHAT VIEW
// =========================================================================
const ViewChat = () => {
  const wrap = div('modal-wrap');
  wrap.append(div({ cls: 'modal-hdr' },
    h('button', { cls: 'icon-btn tap', onClick: () => { state.view = null; render(); } }, svg('back', 20)),
    div({ style: { flex: 1, display: 'flex', alignItems: 'center', gap: '10px' } },
      div({ style: { width: '36px', height: '36px', borderRadius: '12px', background: 'var(--gradient-1)', display: 'flex', alignItems: 'center', justifyContent: 'center' } }, svg('bot', 18, { color: 'white' })),
      div({},
        h('h2', { style: { fontSize: '15px' } }, 'Forge'),
        div({ style: { fontSize: '11px', color: 'var(--success)', display: 'flex', alignItems: 'center', gap: '5px' } },
          div({ style: { width: '6px', height: '6px', borderRadius: '50%', background: 'var(--success)' } }),
          'Online · Ready'
        )
      )
    ),
    h('button', { cls: 'icon-btn tap', onClick: () => { state.view = 'settings'; render(); } }, svg('key', 18))
  ));

  const msgList = div('chat-msgs');
  msgList.id = 'chat-msg-list';
  state.chatHistory.forEach((m, idx) => {
    const isAI = m.role === 'assistant';
    const thinking = m.thinking;
    const bub = div({ cls: `msg ${isAI ? 'msg-ai' : 'msg-user'}${thinking ? ' msg-think' : ''}`,
      style: { animationDelay: `${Math.min(idx * 0.04, 0.3)}s` }
    });
    if (thinking) {
      bub.append(h('span', {}, '●'), h('span', {}, '●'), h('span', {}, '●'));
    } else {
      bub.appendChild(document.createTextNode(m.content));
    }
    msgList.append(bub);
  });
  wrap.append(msgList);
  setTimeout(() => { msgList.scrollTop = msgList.scrollHeight; }, 50);

  const chips = div({ cls: 'filter-chips', style: { padding: '8px 16px' } });
  ['Recommend me a game', 'Best RPGs right now?', 'Tips for Elden Ring?', 'What\'s free to play?'].forEach(c => {
    chips.append(div({ cls: 'chip tap', onClick: () => sendChat(c) }, c));
  });
  wrap.append(chips);

  const inpArea = div('chat-inp-area');
  const inpRow = div({ style: { display: 'flex', gap: '10px', alignItems: 'center' } });
  const input = h('input', { cls: 'inp', placeholder: 'Ask Forge anything...', style: { flex: 1, borderRadius: '24px' } });

  const sendChat = async (txt) => {
    const val = (txt || input.value).trim();
    if (!val || state.chatLoading) return;
    input.value = '';
    state.chatLoading = true;
    state.chatHistory.push({ role: 'user', content: val });
    state.chatHistory.push({ role: 'assistant', content: '', thinking: true });
    render();
    setTimeout(() => { const l = document.getElementById('chat-msg-list'); if (l) l.scrollTop = l.scrollHeight; }, 30);
    const reply = await askAI(val);
    state.chatLoading = false;
    state.chatHistory = state.chatHistory.filter(m => !m.thinking);
    state.chatHistory.push({ role: 'assistant', content: reply });
    render();
    setTimeout(() => { const l = document.getElementById('chat-msg-list'); if (l) l.scrollTop = l.scrollHeight; }, 30);
  };

  const sendBtn = h('button', { cls: 'btn-primary tap', style: { width: '48px', height: '48px', padding: 0, borderRadius: '24px' },
    onClick: () => sendChat(null)
  }, state.chatLoading ? h('div', { cls: 'spinner', style: { borderTopColor: 'white' } }) : svg('send', 18, { color: 'white' }));

  input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); sendChat(null); } });
  inpRow.append(input, sendBtn);
  inpArea.append(inpRow);
  wrap.append(inpArea);

  setTimeout(() => input.focus(), 200);
  return wrap;
};

// =========================================================================
// SETTINGS VIEW
// =========================================================================
const ViewSettings = () => {
  const settings = storage.get('cfg') || {};
  const wrap = div('modal-wrap');
  wrap.append(div({ cls: 'modal-hdr' },
    h('button', { cls: 'icon-btn tap', onClick: () => { state.view = null; render(); } }, svg('back', 20)),
    h('h2', { style: { flex: 1 } }, 'Settings')
  ));

  const body = div('modal-body');

  const keyCard = div({ cls: 'settings-card' },
    h('h3', {}, svg('bot', 18, { color: 'var(--accent)' }), 'AI Co-pilot API Key'),
    p({}, 'Powers Forge, your gaming AI assistant. Get a free key at openrouter.ai and paste it here.'),
    h('input', { id: 'or-key-inp', cls: 'inp', type: 'password', placeholder: 'sk-or-v1-...', value: settings.openrouter_key || '' }),
    h('button', { cls: 'btn-primary', style: { width: '100%' }, onClick: () => {
      const k = document.getElementById('or-key-inp')?.value?.trim() || '';
      storage.set('cfg', { ...settings, openrouter_key: k });
      showToast(k ? '✓ API key saved' : 'Key cleared', 'success');
      setTimeout(() => render(), 800);
    } }, svg('key', 16), 'Save API Key')
  );
  if (settings.openrouter_key) {
    keyCard.append(div({ style: { marginTop: '14px' } }, h('span', { cls: 'status-pill online' }, h('div', { cls: 'dot' }), 'AI Active')));
  } else {
    keyCard.append(div({ style: { marginTop: '14px' } }, h('span', { cls: 'status-pill offline' }, h('div', { cls: 'dot' }), 'AI Offline')));
  }
  body.append(keyCard);

  const refreshCard = div({ cls: 'settings-card' },
    h('h3', {}, svg('refresh', 18, { color: 'var(--accent-2)' }), 'Refresh Data'),
    p({}, 'Re-fetch fresh games, new releases, and trending content from the store.'),
    h('button', { cls: 'btn-secondary tap', style: { width: '100%' }, onClick: () => {
      state.loading = true; render(); loadData(); showToast('Refreshing fresh content...');
    } }, svg('refresh', 16), 'Refresh Now')
  );
  body.append(refreshCard);

  const aboutCard = div({ cls: 'settings-card' },
    h('h3', {}, svg('spark', 18, { color: 'var(--gold)' }), 'About PlayForge'),
    p({}, 'Your personal cross-store game library manager. Built with vanilla JS and the RAWG API.'),
    p({ style: { fontSize: '12px', marginTop: '8px' } }, 'Version 3.0 · Cross-Store Edition')
  );
  body.append(aboutCard);

  const dangerCard = div({ cls: 'settings-card' },
    h('h3', {}, svg('trash', 18, { color: 'var(--danger)' }), 'Danger Zone'),
    p({}, 'Clear all imported games, wishlist, and settings. This cannot be undone.'),
    h('button', { cls: 'btn-secondary tap', style: { width: '100%', color: 'var(--danger)' }, onClick: () => {
      if (confirm('Clear ALL local data?')) {
        localStorage.clear();
        location.reload();
      }
    } }, 'Clear All Local Data')
  );
  body.append(dangerCard);

  wrap.append(body);
  return wrap;
};

// =========================================================================
// GAME ACTIONS
// =========================================================================
const addToWishlist = (g) => {
  if (isInWishlist(g.name)) { showToast('Already in wishlist'); return; }
  state.wishlist.unshift({
    id: g.id || g._rawgId,
    name: g.name,
    background_image: g.background_image,
    genres: g.genres,
    rating: g.rating,
    released: g.released,
  });
  saveWishlist();
  showToast('♥ Added to wishlist', 'success');
  if (state.view === 'detail') render();
  confetti();
};

const toggleVault = (g) => {
  if (isInWishlist(g.name)) {
    state.wishlist = state.wishlist.filter(x => x.name.toLowerCase() !== g.name.toLowerCase());
    saveWishlist();
    showToast('Removed from wishlist');
  } else {
    addToWishlist(g);
    return;
  }
  if (state.view === 'detail') render();
};

// =========================================================================
// BOOT
// =========================================================================
loadLocal();
render();
loadData();
</script>
</body>
</html>
