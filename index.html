<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a14">
  <title>PlayForge · My Game Universe</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root {
  --bg:           #07060f;
  --bg-2:         #0f0d1f;
  --surface:      #1a1a2e;
  --surface-hl:   #252542;
  --border:       rgba(255,255,255,0.08);
  --text:         #ffffff;
  --muted:        rgba(255,255,255,0.55);
  --muted-2:      rgba(255,255,255,0.32);
  --accent:       #8b5cf6;
  --accent-2:     #c084fc;
  --accent-3:     #f472b6;
  --accent-glow:  rgba(139,92,246,0.5);
  --success:      #10b981;
  --warn:         #f59e0b;
  --danger:       #ef4444;
  --gold:         #fbbf24;
  --epic:         #2a2a2a;
  --epic-color:   #0078f2;
  --steam-color:  #66c0f4;
  --gog-color:    #a855f7;
  --ps-color:     #003791;
  --xbox-color:   #107c10;
  --switch-color: #e60012;
  --nav-h:        68px;
  --spring:       cubic-bezier(0.34, 1.56, 0.64, 1);
  --bounce:       cubic-bezier(0.68, -0.55, 0.27, 1.55);
  --ease:         cubic-bezier(0.4, 0, 0.2, 1);
  --rubber:       cubic-bezier(0.175, 0.885, 0.32, 1.4);
  --gradient-1:   linear-gradient(135deg, #8b5cf6 0%, #c084fc 50%, #f472b6 100%);
  --gradient-epic: linear-gradient(135deg, #2a2a2a 0%, #0078f2 100%);
  --gradient-steam: linear-gradient(135deg, #1b2838 0%, #66c0f4 100%);
  --gradient-gog: linear-gradient(135deg, #6b21a8 0%, #a855f7 100%);
}

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
html { height: 100%; }
body { background: var(--bg); color: var(--text); height: 100%; width: 100%; overflow: hidden; }
#app { height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; }
::-webkit-scrollbar { width: 0; height: 0; }

/* ===== Animated background ===== */
.bg-glow { position: fixed; pointer-events: none; z-index: 0; border-radius: 50%; filter: blur(80px); opacity: 0.5; }
.bg-glow.a { top: -200px; left: -100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,92,246,0.3) 0%, transparent 60%); animation: floatA 12s ease-in-out infinite; }
.bg-glow.b { top: 40%; right: -150px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(244,114,182,0.2) 0%, transparent 60%); animation: floatB 15s ease-in-out infinite; }
.bg-glow.c { bottom: -200px; left: 30%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(102,192,244,0.15) 0%, transparent 60%); animation: floatC 18s ease-in-out infinite; }
@keyframes floatA { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(80px, 60px) scale(1.2); } }
@keyframes floatB { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-60px, 80px) scale(1.1); } }
@keyframes floatC { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(40px, -60px) scale(1.15); } }

/* ===== Layout ===== */
.view-wrap { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: calc(var(--nav-h) + 16px); -webkit-overflow-scrolling: touch; position: relative; z-index: 1; }
.view-wrap::-webkit-scrollbar { display: none; }
.hide-scroll { scrollbar-width: none; -ms-overflow-style: none; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.hide-scroll::-webkit-scrollbar { display: none; }
.lc1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

/* ===== MEGA Animations ===== */
@keyframes fadeUp   { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn    { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
@keyframes slideUp  { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes slideDown{ from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn  { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes scaleIn  { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes zoomIn   { from { transform: scale(1.1); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes shimmer  { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes spin     { to { transform: rotate(360deg); } }
@keyframes pulse    { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes blink    { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes gradient { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
@keyframes bounce   { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
@keyframes rubber   { 0% { transform: scale(1); } 30% { transform: scale(1.25, 0.75); } 40% { transform: scale(0.75, 1.25); } 50% { transform: scale(1.15, 0.85); } 65% { transform: scale(0.95, 1.05); } 75% { transform: scale(1.05, 0.95); } 100% { transform: scale(1); } }
@keyframes liquid   { 0% { border-radius: 60% 40% 30% 70%/60% 30% 70% 40%; } 50% { border-radius: 30% 60% 70% 40%/50% 60% 30% 60%; } 100% { border-radius: 60% 40% 30% 70%/60% 30% 70% 40%; } }
@keyframes jelly    { 0%, 100% { transform: scale(1) rotate(0); } 25% { transform: scale(0.95, 1.05) rotate(-1deg); } 50% { transform: scale(1.05, 0.95) rotate(1deg); } 75% { transform: scale(0.98, 1.02) rotate(0); } }
@keyframes glow     { 0%, 100% { box-shadow: 0 0 20px var(--accent-glow); } 50% { box-shadow: 0 0 40px var(--accent-glow); } }
@keyframes shine    { 0% { transform: translateX(-100%) skewX(-15deg); } 100% { transform: translateX(300%) skewX(-15deg); } }
@keyframes heartbeat { 0%, 100% { transform: scale(1); } 14% { transform: scale(1.3); } 28% { transform: scale(1); } 42% { transform: scale(1.3); } 70% { transform: scale(1); } }
@keyframes progressShimmer { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
@keyframes ripple   { to { transform: scale(4); opacity: 0; } }
@keyframes ticker   { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
@keyframes floaty   { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes confetti { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(500px) rotate(720deg); opacity: 0; } }
@keyframes morph    { 0%, 100% { transform: scale(1) rotate(0deg); border-radius: 16px; } 33% { transform: scale(1.02) rotate(0.5deg); border-radius: 18px; } 66% { transform: scale(0.98) rotate(-0.5deg); border-radius: 14px; } }
@keyframes typeIn   { from { width: 0; } to { width: 100%; } }
@keyframes caret    { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

.anim-fadeup { animation: fadeUp 0.5s var(--ease) both; }
.anim-pop    { animation: popIn 0.4s var(--spring) both; }

.stagger > * { animation: fadeUp 0.5s var(--ease) both; }
.stagger > *:nth-child(1) { animation-delay: 0.05s; }
.stagger > *:nth-child(2) { animation-delay: 0.10s; }
.stagger > *:nth-child(3) { animation-delay: 0.15s; }
.stagger > *:nth-child(4) { animation-delay: 0.20s; }
.stagger > *:nth-child(5) { animation-delay: 0.25s; }
.stagger > *:nth-child(6) { animation-delay: 0.30s; }
.stagger > *:nth-child(7) { animation-delay: 0.35s; }
.stagger > *:nth-child(8) { animation-delay: 0.40s; }
.stagger > *:nth-child(9) { animation-delay: 0.45s; }
.stagger > *:nth-child(10){ animation-delay: 0.50s; }
.stagger > *:nth-child(n+11){ animation-delay: 0.55s; }

/* ===== Buttons ===== */
.btn-primary  { background: var(--gradient-1); background-size: 200% 200%; color: white; font-weight: 700; border: none; border-radius: 14px; padding: 14px 22px; font-size: 15px; display: inline-flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.25s var(--rubber), box-shadow 0.3s, background-position 0.5s; box-shadow: 0 4px 16px var(--accent-glow); position: relative; overflow: hidden; }
.btn-primary:hover { background-position: 100% 50%; box-shadow: 0 8px 28px var(--accent-glow); transform: translateY(-2px) scale(1.02); }
.btn-primary:active { transform: scale(0.95); }
.btn-primary::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shine 3s infinite; }
.btn-secondary{ background: var(--surface-hl); color: var(--text); font-weight: 600; border: 1px solid var(--border); border-radius: 14px; padding: 13px 22px; font-size: 14px; display: inline-flex; justify-content: center; align-items: center; gap: 6px; cursor: pointer; transition: all 0.2s var(--spring); }
.btn-secondary:hover { background: var(--surface); border-color: rgba(255,255,255,0.15); transform: translateY(-1px) scale(1.02); }
.btn-secondary:active { transform: scale(0.96); }
.btn-epic  { background: var(--gradient-epic); color: white; font-weight: 700; border: none; border-radius: 12px; padding: 12px 20px; font-size: 14px; display: inline-flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; transition: all 0.25s var(--rubber); }
.btn-epic:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 20px rgba(0,120,242,0.4); }
.btn-steam { background: var(--gradient-steam); color: white; font-weight: 700; border: none; border-radius: 12px; padding: 12px 20px; font-size: 14px; display: inline-flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; transition: all 0.25s var(--rubber); }
.btn-steam:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 20px rgba(102,192,244,0.4); }
.btn-gog   { background: var(--gradient-gog); color: white; font-weight: 700; border: none; border-radius: 12px; padding: 12px 20px; font-size: 14px; display: inline-flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; transition: all 0.25s var(--rubber); }
.btn-gog:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 20px rgba(168,85,247,0.4); }
.icon-btn   { width: 40px; height: 40px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); display: inline-flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; color: var(--text); transition: all 0.25s var(--spring); }
.icon-btn:hover { background: var(--surface-hl); transform: scale(1.1) rotate(5deg); }
.icon-btn:active { transform: scale(0.9); }
.tap { transition: transform 0.2s var(--spring); }
.tap:active { transform: scale(0.94); }
.tap:hover { transform: translateY(-2px) scale(1.02); }

.chip   { background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-radius: 99px; padding: 8px 16px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.25s var(--spring); display: inline-flex; align-items: center; gap: 6px; }
.chip:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,0.2); transform: translateY(-2px) scale(1.05); }
.chip.active { background: var(--text); color: #000; border-color: var(--text); box-shadow: 0 4px 12px rgba(255,255,255,0.2); animation: rubber 0.5s var(--rubber); }

.inp { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 13px 16px; color: var(--text); font-size: 14px; outline: none; width: 100%; transition: border-color 0.2s, box-shadow 0.2s; }
.inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,92,246,0.18); }
.inp::placeholder { color: var(--muted); }
textarea.inp { font-family: 'SF Mono', Monaco, monospace; font-size: 12px; resize: vertical; min-height: 120px; }

.skel { background: linear-gradient(90deg, var(--surface) 0%, var(--surface-hl) 50%, var(--surface) 100%); background-size: 200% 100%; animation: shimmer 1.6s infinite; border-radius: 10px; }

/* ===== Top Header ===== */
.top-header { position: sticky; top: 0; z-index: 30; background: rgba(7,6,15,0.88); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); animation: slideDown 0.4s var(--ease) both; }
.top-header-content { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
.app-title { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; background: var(--gradient-1); background-size: 200% 200%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: gradient 4s ease infinite; }
.search-pill { flex: 1; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.2s var(--spring); }
.search-pill:hover { background: var(--surface-hl); border-color: var(--accent); transform: scale(1.02); }
.search-pill span { color: var(--muted); font-size: 13px; font-weight: 500; }

/* ===== Bottom Nav ===== */
.nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: rgba(7,6,15,0.92); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding: 0 8px 10px; z-index: 50; animation: slideUp 0.4s var(--ease) both; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--muted); background: none; border: none; font-size: 10px; font-weight: 600; min-width: 60px; padding: 6px 4px; cursor: pointer; transition: color 0.2s, transform 0.2s var(--spring); position: relative; }
.nav-btn:active { transform: scale(0.85); }
.nav-btn.active { color: var(--text); }
.nav-btn.active::before { content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 28px; height: 3px; background: var(--gradient-1); background-size: 200% 200%; border-radius: 2px; animation: gradient 3s ease infinite; }
.nav-icon-wrap { display: flex; align-items: center; justify-content: center; transition: transform 0.3s var(--rubber); }
.nav-btn.active .nav-icon-wrap { animation: bounce 1.2s ease infinite; }

/* ===== Hero Banner ===== */
.hero-banner { position: relative; border-radius: 22px; overflow: hidden; aspect-ratio: 16/9; margin: 16px 20px; cursor: pointer; box-shadow: 0 16px 48px rgba(0,0,0,0.6); transition: transform 0.4s var(--spring); }
.hero-banner:hover { transform: translateY(-3px) scale(1.01); }
.hero-banner:active { transform: scale(0.98); }
.hero-banner img { width: 100%; height: 100%; object-fit: cover; display: block; animation: zoomIn 0.8s var(--ease) both; transition: transform 8s linear; }
.hero-banner:hover img { transform: scale(1.1); }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(7,6,15,0.2) 0%, rgba(7,6,15,0.4) 50%, rgba(7,6,15,0.98) 100%); }
.hero-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 22px; }
.hero-tag { display: inline-block; background: var(--gradient-1); background-size: 200% 200%; color: white; font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 8px; letter-spacing: 0.5px; margin-bottom: 10px; text-transform: uppercase; animation: popIn 0.4s var(--spring) 0.2s both, gradient 3s ease infinite; }
.hero-title { font-size: 28px; font-weight: 900; line-height: 1.1; margin-bottom: 8px; text-shadow: 0 2px 16px rgba(0,0,0,0.8); animation: fadeUp 0.5s var(--ease) 0.1s both; }
.hero-sub { font-size: 13px; color: rgba(255,255,255,0.85); margin-bottom: 16px; animation: fadeUp 0.5s var(--ease) 0.2s both; }
.hero-cta { display: inline-flex; align-items: center; gap: 8px; background: white; color: #000; font-weight: 700; font-size: 14px; padding: 11px 22px; border-radius: 14px; border: none; cursor: pointer; transition: transform 0.2s var(--rubber); animation: fadeUp 0.5s var(--ease) 0.3s both; }
.hero-cta:hover { transform: scale(1.08); }
.hero-cta:active { transform: scale(0.94); }
.hero-dots { position: absolute; bottom: 16px; right: 20px; display: flex; gap: 6px; animation: fadeIn 0.6s var(--ease) 0.4s both; }
.hero-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: all 0.3s var(--spring); cursor: pointer; }
.hero-dot.active { width: 24px; border-radius: 3px; background: white; }

/* ===== Section Header ===== */
.section { padding: 0 20px; margin-top: 32px; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
.section-title .emoji { font-size: 22px; animation: bounce 2s ease infinite; }
.section-link { color: var(--accent-2); font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.section-link:hover { opacity: 0.8; }

/* ===== Cards Row ===== */
.cards-row { display: flex; gap: 14px; padding: 0 20px; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
.cards-row::-webkit-scrollbar { display: none; }
.game-card { flex-shrink: 0; width: 150px; cursor: pointer; scroll-snap-align: start; transition: transform 0.35s var(--rubber); }
.game-card:hover { transform: translateY(-6px); }
.game-card-img { width: 100%; aspect-ratio: 3/4; border-radius: 16px; overflow: hidden; background: var(--surface); position: relative; margin-bottom: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.game-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s var(--ease); }
.game-card:hover .game-card-img img { transform: scale(1.12); }
.game-card-img::after { content: ''; position: absolute; inset: 0; border-radius: 16px; border: 2px solid transparent; transition: border-color 0.3s; pointer-events: none; }
.game-card:hover .game-card-img::after { border-color: var(--accent); box-shadow: inset 0 0 20px var(--accent-glow); }
.game-card-img .badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); color: white; font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 6px; letter-spacing: 0.5px; text-transform: uppercase; animation: popIn 0.3s var(--spring) 0.2s both; }
.game-card-img .badge.free { background: var(--success); }
.game-card-img .badge.hot  { background: var(--danger); }
.game-card-img .badge.soon { background: var(--warn); color: #000; }
.game-card-img .badge.new  { background: var(--gradient-1); }
.game-card-img .badge.owned { background: var(--success); animation: heartbeat 1.5s ease infinite; }
.game-card-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; transition: color 0.2s; }
.game-card:hover .game-card-title { color: var(--accent-2); }
.game-card-meta { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
.game-card-meta .star { color: var(--gold); }

.featured-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; }
.featured-card { aspect-ratio: 1; border-radius: 16px; overflow: hidden; position: relative; cursor: pointer; background: var(--surface); transition: transform 0.35s var(--rubber); }
.featured-card:hover { transform: scale(1.06); }
.featured-card:active { transform: scale(0.95); }
.featured-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s var(--ease); }
.featured-card:hover img { transform: scale(1.2); }
.featured-card .gradient { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.95) 100%); }
.featured-card .label { position: absolute; bottom: 8px; left: 8px; right: 8px; font-size: 11px; font-weight: 700; line-height: 1.2; }
.featured-card .store-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); padding: 3px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; }

/* ===== Chart List ===== */
.chart-item { display: flex; align-items: center; gap: 14px; padding: 12px 8px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s, transform 0.25s var(--spring); border-radius: 10px; }
.chart-item:hover { background: var(--surface); transform: translateX(4px); }
.chart-item:last-child { border-bottom: none; }
.chart-rank { font-size: 22px; font-weight: 900; color: var(--muted); width: 28px; text-align: center; font-style: italic; transition: color 0.2s; }
.chart-item:hover .chart-rank { color: var(--accent-2); }
.chart-rank.top { background: var(--gradient-1); background-size: 200% 200%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: gradient 3s ease infinite; }
.chart-thumb { width: 56px; height: 56px; border-radius: 12px; overflow: hidden; flex-shrink: 0; background: var(--surface); transition: transform 0.3s var(--rubber); position: relative; }
.chart-item:hover .chart-thumb { transform: scale(1.1) rotate(-2deg); }
.chart-thumb img { width: 100%; height: 100%; object-fit: cover; }
.chart-thumb .mini-store { position: absolute; bottom: 2px; right: 2px; width: 16px; height: 16px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: white; }
.chart-info { flex: 1; min-width: 0; }
.chart-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.chart-meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.chart-meta .star { color: var(--gold); }
.chart-meta .owned-tag { background: var(--success); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; }
.chart-cta { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 7px 16px; border-radius: 99px; font-size: 12px; font-weight: 700; cursor: pointer; flex-shrink: 0; transition: all 0.25s var(--spring); }
.chart-cta:hover { background: var(--accent); border-color: var(--accent); transform: scale(1.08); }
.chart-cta:active { transform: scale(0.92); }
.chart-cta.owned { background: var(--success); border-color: var(--success); color: white; }

/* ===== Search Result Card (FIXED) ===== */
.search-wrap { padding: 0 20px; }
.search-input-wrap { position: relative; margin-bottom: 14px; }
.search-input-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.search-input-wrap .inp { padding-left: 42px; padding-right: 42px; }
.search-input-wrap .clear-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 30px; height: 30px; border-radius: 50%; background: var(--surface-hl); display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; color: var(--muted); }
.search-input-wrap .clear-btn:hover { background: var(--danger); color: white; }
.filter-chips { display: flex; gap: 8px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 4px; }
.filter-chips::-webkit-scrollbar { display: none; }

.search-results-grid { display: flex; flex-direction: column; gap: 10px; }
.search-result { display: flex; align-items: center; gap: 14px; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; cursor: pointer; transition: all 0.3s var(--spring); position: relative; overflow: hidden; }
.search-result::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(139,92,246,0.1), transparent); transition: left 0.5s; }
.search-result:hover { background: var(--surface-hl); border-color: var(--accent); transform: translateX(4px) scale(1.01); }
.search-result:hover::before { left: 100%; }
.search-result img { width: 72px; height: 72px; border-radius: 12px; object-fit: cover; flex-shrink: 0; background: var(--bg-2); transition: transform 0.3s var(--rubber); }
.search-result:hover img { transform: scale(1.1) rotate(-2deg); }
.search-result-info { flex: 1; min-width: 0; min-height: 60px; }
.search-result-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.search-result-meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.search-result-meta .star { color: var(--gold); }
.search-result-badges { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.owned-mini-badge { background: var(--success); color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; display: inline-flex; align-items: center; gap: 3px; }
.wish-mini-badge { background: var(--gold); color: #000; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; }
.search-result-cta { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; flex-shrink: 0; }
.cta-btn { padding: 7px 14px; border-radius: 99px; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.2s var(--rubber); border: none; }
.cta-btn.get { background: var(--gradient-1); color: white; }
.cta-btn.get:hover { transform: scale(1.1); }
.cta-btn.owned { background: var(--success); color: white; }
.cta-btn.wish { background: var(--gold); color: #000; }
.cta-btn:active { transform: scale(0.9); }

.search-suggestion { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
.search-suggestion h4 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 700; }
.suggestion-list { display: flex; flex-direction: column; gap: 6px; }
.suggestion-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg-2); border-radius: 10px; cursor: pointer; transition: all 0.2s; }
.suggestion-item:hover { background: var(--surface-hl); transform: translateX(4px); }
.suggestion-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--surface); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.suggestion-text { flex: 1; }
.suggestion-title { font-size: 13px; font-weight: 600; }
.suggestion-meta { font-size: 11px; color: var(--muted); }

/* ===== Library / My Games ===== */
.library-tabs { display: flex; gap: 0; padding: 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
.library-tab { padding: 14px 16px; font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.25s var(--spring); background: none; border-top: none; border-left: none; border-right: none; position: relative; }
.library-tab:hover { color: var(--text); }
.library-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.library-tab.active::after { content: ''; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); width: 30px; height: 2px; background: var(--accent); border-radius: 1px; animation: rubber 0.6s var(--rubber); }

.store-pills { display: flex; gap: 8px; padding: 0 20px; margin-bottom: 16px; overflow-x: auto; }
.store-pills::-webkit-scrollbar { display: none; }
.store-pill { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 99px; font-size: 12px; font-weight: 700; cursor: pointer; background: var(--surface); color: var(--muted); border: 1px solid var(--border); transition: all 0.25s var(--spring); white-space: nowrap; }
.store-pill:hover { transform: translateY(-2px) scale(1.05); }
.store-pill.active { color: white; }
.store-pill[data-store="all"].active { background: var(--gradient-1); border-color: transparent; }
.store-pill[data-store="epic"].active { background: var(--gradient-epic); border-color: transparent; }
.store-pill[data-store="steam"].active { background: var(--gradient-steam); border-color: transparent; }
.store-pill[data-store="gog"].active { background: var(--gradient-gog); border-color: transparent; }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; }
.empty-state-icon { width: 100px; height: 100px; border-radius: 30px; background: var(--gradient-1); background-size: 200% 200%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; animation: liquid 4s ease-in-out infinite, gradient 3s ease infinite; box-shadow: 0 8px 32px var(--accent-glow); }
.empty-state-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.empty-state-text { font-size: 14px; color: var(--muted); max-width: 280px; line-height: 1.5; margin-bottom: 20px; }
.import-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }

/* ===== Profile ===== */
.profile-hero { padding: 24px 20px; display: flex; align-items: center; gap: 16px; animation: fadeUp 0.5s var(--ease) both; }
.profile-avatar { width: 72px; height: 72px; border-radius: 24px; background: var(--gradient-1); background-size: 200% 200%; display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0; box-shadow: 0 8px 24px var(--accent-glow); animation: gradient 4s ease infinite, glow 2.5s ease-in-out infinite, liquid 6s ease-in-out infinite; }
.profile-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.profile-tag { color: var(--muted); font-size: 13px; font-weight: 500; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 20px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 6px; text-align: center; transition: transform 0.25s var(--rubber), border-color 0.2s; cursor: pointer; }
.stat-card:hover { transform: translateY(-3px) scale(1.05); border-color: var(--accent); }
.stat-value { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 2px; }
.stat-value.epic { color: var(--epic-color); }
.stat-value.steam { color: var(--steam-color); }
.stat-value.gog { color: var(--gog-color); }
.stat-value.wish { color: var(--gold); }
.stat-label { font-size: 9px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }

.menu-section { background: var(--surface); margin: 0 20px 16px; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
.menu-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; cursor: pointer; transition: background 0.2s, transform 0.2s var(--spring); border-bottom: 1px solid var(--border); }
.menu-item:last-child { border-bottom: none; }
.menu-item:hover { background: var(--surface-hl); transform: translateX(4px); }
.menu-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--surface-hl); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.3s var(--rubber); }
.menu-item:hover .menu-icon { transform: scale(1.1) rotate(8deg); }
.menu-text { flex: 1; font-size: 14px; font-weight: 600; }
.menu-arrow { color: var(--muted-2); transition: transform 0.2s; }
.menu-item:hover .menu-arrow { transform: translateX(4px); color: var(--accent-2); }

/* ===== Detail Page ===== */
.detail-wrap { position: fixed; inset: 0; overflow-y: auto; background: var(--bg); z-index: 70; -webkit-overflow-scrolling: touch; padding-bottom: 40px; }
.detail-wrap::-webkit-scrollbar { display: none; }
.detail-hero { position: relative; width: 100%; aspect-ratio: 16/10; overflow: hidden; }
.detail-hero img { width: 100%; height: 100%; object-fit: cover; animation: zoomIn 0.8s var(--ease) both; transition: transform 10s linear; }
.detail-hero-grad { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(7,6,15,0.3) 0%, transparent 30%, transparent 60%, var(--bg) 100%); }
.detail-nav-btns { position: absolute; top: 50px; left: 16px; right: 16px; display: flex; justify-content: space-between; animation: slideDown 0.4s var(--ease) both; }
.detail-nav-btns .icon-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.detail-info-block { padding: 0 20px; margin-top: -32px; position: relative; animation: fadeUp 0.5s var(--ease) 0.2s both; }
.detail-title { font-size: 30px; font-weight: 900; letter-spacing: -0.5px; line-height: 1.15; margin-bottom: 8px; }
.detail-developer { font-size: 14px; color: var(--muted); margin-bottom: 16px; }
.detail-developer span { color: var(--text); font-weight: 600; }
.detail-stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.detail-stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; flex: 1; min-width: 90px; transition: transform 0.25s var(--rubber), border-color 0.2s; }
.detail-stat-pill:hover { transform: translateY(-3px) scale(1.03); border-color: var(--accent); }
.detail-stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 4px; }
.detail-stat-value { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 4px; }
.detail-stat-value.gold { color: var(--gold); }
.detail-stat-value.success { color: var(--success); }

.ownership-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; animation: jelly 0.6s var(--ease) both; }
.ownership-bar.owned { border-color: var(--success); background: linear-gradient(135deg, rgba(16,185,129,0.12), var(--surface)); }
.ownership-bar .check { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--success); animation: heartbeat 1.5s ease infinite; }
.ownership-bar .text { flex: 1; }
.ownership-bar .text strong { display: block; font-size: 14px; margin-bottom: 2px; }
.ownership-bar .text small { font-size: 11px; color: var(--muted); }
.ownership-bar .store-mini-icon { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; color: white; margin-top: 4px; }

.detail-cta-row { display: flex; gap: 10px; margin-bottom: 16px; }
.detail-cta-row .btn-primary { flex: 1; }
.detail-cta-row .btn-secondary { width: 50px; flex-shrink: 0; padding: 0; }

.detail-section { padding: 0 20px; margin-bottom: 28px; animation: fadeUp 0.5s var(--ease) both; }
.detail-section h3 { font-size: 17px; font-weight: 800; margin-bottom: 12px; }
.detail-desc { font-size: 14px; line-height: 1.65; color: rgba(255,255,255,0.78); }

.screenshot-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
.screenshot-row::-webkit-scrollbar { display: none; }
.screenshot { height: 160px; border-radius: 12px; object-fit: cover; flex-shrink: 0; cursor: pointer; transition: transform 0.3s var(--rubber); }
.screenshot:hover { transform: scale(1.06); }

/* Platform availability */
.platform-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
.platform-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 10px; transition: all 0.25s var(--spring); cursor: pointer; }
.platform-card:hover { transform: translateY(-3px) scale(1.04); border-color: var(--accent); }
.platform-logo { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.platform-info { flex: 1; min-width: 0; }
.platform-name { font-size: 13px; font-weight: 700; }
.platform-status { font-size: 10px; color: var(--muted); }
.platform-card.owned-platform { border-color: var(--success); background: linear-gradient(135deg, rgba(16,185,129,0.08), var(--surface)); }
.platform-card.owned-platform .platform-status { color: var(--success); font-weight: 700; }

/* Video trailers */
.video-row { display: flex; gap: 10px; overflow-x: auto; margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
.video-row::-webkit-scrollbar { display: none; }
.video-thumb { height: 180px; min-width: 280px; border-radius: 12px; overflow: hidden; position: relative; flex-shrink: 0; cursor: pointer; background: var(--surface); transition: transform 0.3s var(--rubber); border: 1px solid var(--border); }
.video-thumb:hover { transform: scale(1.05); border-color: var(--accent); }
.video-thumb img { width: 100%; height: 100%; object-fit: cover; }
.video-thumb .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); transition: background 0.2s; }
.video-thumb:hover .play-icon { background: rgba(0,0,0,0.2); }
.video-thumb .play-circle { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.95); display: flex; align-items: center; justify-content: center; transition: transform 0.3s var(--rubber); }
.video-thumb:hover .play-circle { transform: scale(1.15); }
.video-thumb .video-label { position: absolute; bottom: 8px; left: 8px; right: 8px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }

.addon-list { display: flex; flex-direction: column; gap: 8px; }
.addon-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; transition: all 0.2s var(--spring); }
.addon-item:hover { background: var(--surface-hl); transform: translateX(4px); border-color: var(--accent); }
.addon-thumb { width: 48px; height: 48px; border-radius: 8px; background: var(--bg-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; }
.addon-info { flex: 1; min-width: 0; }
.addon-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.addon-meta { font-size: 11px; color: var(--muted); }
.addon-status { padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }
.addon-status.owned { background: rgba(16,185,129,0.15); color: var(--success); }

.rating-summary { display: flex; align-items: center; gap: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
.rating-big { font-size: 56px; font-weight: 900; line-height: 1; color: var(--gold); }
.rating-text { font-size: 13px; color: var(--muted); margin-top: 4px; }
.rating-bars { flex: 1; }
.rating-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.rating-bar-row span:first-child { font-size: 12px; color: var(--muted); width: 12px; }
.rating-bar { flex: 1; height: 6px; background: var(--surface-hl); border-radius: 3px; overflow: hidden; }
.rating-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.8s var(--ease); }

.tags-row { display: flex; flex-wrap: wrap; gap: 8px; }
.tag { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; transition: all 0.25s var(--spring); cursor: pointer; }
.tag:hover { background: var(--accent); color: white; border-color: var(--accent); transform: translateY(-2px) scale(1.05); }

/* People interaction */
.social-proof { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
.social-proof-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.social-proof:last-child .social-proof-row { margin-bottom: 0; }
.social-avatar-stack { display: flex; }
.social-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gradient-1); border: 2px solid var(--bg); display: flex; align-items: center; justify-content: center; font-size: 14px; margin-left: -8px; }
.social-avatar:first-child { margin-left: 0; }
.social-text { font-size: 13px; }
.social-text strong { font-weight: 700; }

/* Free games now */
.free-now-banner { background: linear-gradient(135deg, #16a34a, #22c55e); border-radius: 16px; padding: 18px; margin: 0 20px 20px; display: flex; align-items: center; gap: 14px; position: relative; overflow: hidden; }
.free-now-banner::before { content: ''; position: absolute; inset: 0; background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%); animation: shine 3s infinite; }
.free-now-banner-icon { font-size: 36px; animation: bounce 1.5s ease infinite; }
.free-now-banner-text { flex: 1; }
.free-now-banner-text h3 { font-size: 16px; font-weight: 900; color: white; margin-bottom: 2px; }
.free-now-banner-text p { font-size: 12px; color: rgba(255,255,255,0.9); }
.free-now-banner-cta { background: white; color: #16a34a; font-weight: 800; padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; }

/* Related games */
.related-row { display: flex; gap: 12px; overflow-x: auto; margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
.related-row::-webkit-scrollbar { display: none; }

/* ===== Modals ===== */
.modal-wrap { position: fixed; inset: 0; z-index: 100; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; animation: slideUp 0.3s var(--ease) both; }
.modal-hdr { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.modal-hdr h2 { font-size: 18px; font-weight: 800; }
.modal-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
.modal-body::-webkit-scrollbar { display: none; }

.settings-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 14px; animation: fadeUp 0.4s var(--ease) both; transition: border-color 0.2s; }
.settings-card:hover { border-color: rgba(255,255,255,0.15); }
.settings-card h3 { font-size: 15px; font-weight: 800; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.settings-card p { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
.settings-card .inp { margin-bottom: 12px; }
.status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; background: var(--surface-hl); }
.status-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
.status-pill.online .dot { background: var(--success); box-shadow: 0 0 8px var(--success); animation: blink 2s infinite; }
.status-pill.offline .dot { background: var(--danger); }

/* Progress UI */
.progress-card { background: var(--surface); border: 1px solid var(--accent); border-radius: 16px; padding: 20px; margin-bottom: 16px; animation: fadeUp 0.4s var(--ease) both; }
.progress-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.progress-title { font-size: 14px; font-weight: 800; }
.progress-count { font-size: 12px; color: var(--muted); }
.progress-bar-outer { height: 8px; background: var(--surface-hl); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
.progress-bar-inner { height: 100%; background: var(--gradient-1); background-size: 200% 200%; border-radius: 4px; transition: width 0.3s var(--ease); animation: gradient 3s ease infinite; }
.progress-current { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.progress-current strong { color: var(--accent-2); font-weight: 700; }
.progress-actions { display: flex; gap: 8px; margin-top: 12px; }

/* ===== AI Chat ===== */
.chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; -webkit-overflow-scrolling: touch; }
.chat-msgs::-webkit-scrollbar { display: none; }
.chat-inp-area { padding: 12px 16px 24px; background: rgba(7,6,15,0.6); backdrop-filter: blur(20px); border-top: 1px solid var(--border); flex-shrink: 0; }
.msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.55; font-weight: 500; word-break: break-word; animation: popIn 0.3s var(--spring) both; }
.msg-ai   { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 6px; align-self: flex-start; }
.msg-user { background: var(--gradient-1); background-size: 200% 200%; color: white; border-bottom-right-radius: 6px; align-self: flex-end; box-shadow: 0 4px 12px var(--accent-glow); animation: gradient 4s ease infinite, popIn 0.3s var(--spring) both; }
.msg-think span { animation: pulse 1.4s ease-in-out infinite; display: inline-block; }
.msg-think span:nth-child(2) { animation-delay: 0.2s; }
.msg-think span:nth-child(3) { animation-delay: 0.4s; }
.spinner { width: 18px; height: 18px; border: 2.5px solid rgba(139,92,246,0.25); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }

/* ===== Stream ===== */
.stream-wrap { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; overflow: hidden; animation: fadeIn 0.3s var(--ease) both; }
.stream-player { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; flex-shrink: 0; }
.stream-player iframe { width: 100%; height: 100%; border: none; display: block; }
.stream-overlay { position: absolute; top: 0; left: 0; right: 0; padding: 50px 16px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 2; }
.stream-overlay .icon-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); }
.stream-live-badge { background: var(--danger); color: white; font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 6px; display: flex; align-items: center; gap: 5px; animation: pulse 1.5s infinite; }
.stream-live-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: white; animation: blink 1.2s infinite; }
.stream-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
.stream-body::-webkit-scrollbar { display: none; }

/* ===== Toast ===== */
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 12px 22px; border-radius: 99px; font-size: 13px; font-weight: 600; z-index: 300; box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: slideDown 0.3s var(--spring) both; white-space: nowrap; max-width: 90%; display: flex; align-items: center; gap: 8px; }
.toast.fade-out { opacity: 0; transition: opacity 0.3s; }
.toast.success { background: var(--success); color: white; }
.toast.error { background: var(--danger); color: white; }

/* ===== Confetti ===== */
.confetti-piece { position: fixed; width: 10px; height: 10px; pointer-events: none; z-index: 400; animation: confetti 2.5s ease-out forwards; }

/* ===== Inline Video Player Modal (real trailer playback) ===== */
.video-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 24px; animation: fadeIn 0.25s var(--ease) both; }
.video-modal-box { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; }
.video-modal-box video { width: 100%; height: 100%; border-radius: 12px; background: #000; display: block; }

@media (min-width: 768px) {
  #app { max-width: 480px; margin: 0 auto; box-shadow: 0 0 60px rgba(0,0,0,0.5); }
  .nav-bar { max-width: 480px; left: 50%; transform: translateX(-50%); }
}

const svg = (name, size = 20, extra = {}) => {
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  const attrs = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', 'stroke-width': '2', 'stroke-linecap': 'round', 'stroke-linejoin': 'round', ...extra };
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  el.innerHTML = ICONS[name] || '';
  return el;
};

// =========================================================================
// STATE
// =========================================================================
const state = {
  tab: 'home',
  loading: true,
  data: { hero: [], featured: [], top: [], newReleases: [], upcoming: [], freeGames: [], freeGiveaways: [], recentlyUpdated: [], action: [], rpg: [], shooter: [], racing: [], indie: [], strategy: [], popular2024: [], horror: [] },
  owned: { epic: [], steam: [], gog: [] },
  wishlist: [],
  customSources: [], // User-added store URLs
  activeGame: null,
  relatedGames: [],
  activeGameVideos: [],
  view: null,
  heroIndex: 0,
  heroTimer: null,
  topChartsTab: 'top',
  search: { query: '', results: [], loading: false, category: 'all' },
  chatHistory: [{ role: 'assistant', content: 'Hey! I\'m Forge, your gaming co-pilot. Ask me about any game, build, strategy, or what to play next. 🎮' }],
  chatLoading: false,
  libraryTab: 'wishlist',                  // wishlist | owned
  ownedFilter: 'all',                      // all | epic | steam | gog
  toast: null,
  toastType: 'default',
  renderScheduled: false,                  // debounce flag
  importProgress: null,                    // { total, done, current, store, cancelled }
};

// =========================================================================
// STORAGE
// =========================================================================
const storage = {
  get: (k) => { try { return JSON.parse(localStorage.getItem('pf_' + k) || 'null'); } catch { return null; } },
  set: (k, v) => localStorage.setItem('pf_' + k, JSON.stringify(v)),
  del: (k) => localStorage.removeItem('pf_' + k),
};

const loadLocal = () => {
  state.owned.epic  = storage.get('owned_epic')  || [];
  state.owned.steam = storage.get('owned_steam') || [];
  state.owned.gog   = storage.get('owned_gog')   || [];
  state.wishlist    = storage.get('wishlist')    || [];
  state.customSources = storage.get('sources')  || [];
};

const saveOwned   = (s) => storage.set('owned_' + s, state.owned[s]);
const saveWishlist    = () => storage.set('wishlist', state.wishlist);
const saveSources     = () => storage.set('sources', state.customSources);

const totalOwned = () => state.owned.epic.length + state.owned.steam.length + state.owned.gog.length;

// =========================================================================
// API
// =========================================================================
const fetchRAWG = async (endpoint) => {
  try {
    const sep = endpoint.includes('?') ? '&' : '?';
    const res = await fetch(`https://api.rawg.io/api/${endpoint}${sep}key=${RAWG_KEY}`);
    if (!res.ok) throw new Error('RAWG ' + res.status);
    const data = await res.json();
    return data.results || data;
  } catch (e) { console.warn('RAWG:', e); return []; }
};

const fetchRAWGPage = async (endpoint, page) => {
  const sep = endpoint.includes('?') ? '&' : '?';
  return fetchRAWG(`${endpoint}${sep}page=${page}&page_size=20`);
};

// Use daily seed + page to get different results each day/refresh
const dailyPage = (max = 6) => (TODAY_SEED % max) + 1;

// Real cross-store free-game giveaways (Epic, Steam, GOG, itch.io, consoles).
// GamerPower is a free, no-API-key giveaway tracker. If it's unreachable
// (e.g. blocked by network/CORS in some environments), this fails silently
// and the existing RAWG "Free To Play" section below still works normally.
const STORE_GIVEAWAY_META = {
  epic:   { label: 'Epic Games', color: '#0078f2' },
  steam:  { label: 'Steam',      color: '#66c0f4' },
  gog:    { label: 'GOG',        color: '#a855f7' },
  itch:   { label: 'itch.io',    color: '#fa5c5c' },
  ps:     { label: 'PlayStation',color: '#003791' },
  xbox:   { label: 'Xbox',       color: '#107c10' },
  switch: { label: 'Switch',     color: '#e60012' },
  other:  { label: 'Other',      color: '#8b5cf6' },
};
const mapGiveawayPlatform = (platforms = '') => {
  const p = platforms.toLowerCase();
  if (p.includes('epic')) return 'epic';
  if (p.includes('steam')) return 'steam';
  if (p.includes('gog')) return 'gog';
  if (p.includes('itch')) return 'itch';
  if (p.includes('playstation') || p.includes('ps4') || p.includes('ps5')) return 'ps';
  if (p.includes('xbox')) return 'xbox';
  if (p.includes('switch')) return 'switch';
  return 'other';
};
const fetchFreeGiveaways = async () => {
  try {
    const res = await fetch('https://www.gamerpower.com/api/giveaways?type=game,loot,beta');
    if (!res.ok) throw new Error('GamerPower ' + res.status);
    const data = await res.json();
    if (!Array.isArray(data)) return [];
    return data.map(d => ({
      id: 'gp_' + d.id,
      name: d.title,
      background_image: d.image,
      thumbnail: d.thumbnail,
      released: d.published_date,
      _giveaway: true,
      _store: mapGiveawayPlatform(d.platforms),
      _giveawayUrl: d.open_giveaway_url || d.gamerpower_url,
      _giveawayType: d.type,
      description_raw: d.description,
      genres: [{ name: d.type === 'game' ? 'Free Giveaway' : (d.type || 'Giveaway') }],
    })).filter(g => g.name && g.background_image);
  } catch (e) { console.warn('GamerPower:', e); return []; }
};

const loadData = async () => {
  const today = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  const ago30  = fmt(new Date(today.getTime() - 30*864e5));
  const ago90  = fmt(new Date(today.getTime() - 90*864e5));
  const ago180 = fmt(new Date(today.getTime() - 180*864e5));
  const ago365 = fmt(new Date(today.getTime() - 365*864e5));
  const next180= fmt(new Date(today.getTime() + 180*864e5));
  const ago730 = fmt(new Date(today.getTime() - 730*864e5));
  const page   = dailyPage(8);
  const giveawaysPromise = fetchFreeGiveaways(); // independent of RAWG, fetched in parallel

  try {
    const [hero, fresh, newG, upcoming, free, updated, action, rpg, shooter, racing, indie, strategy, pop2024, horror] = await Promise.all([
      fetchRAWGPage(`games?ordering=-rating&dates=${ago365},${fmt(today)}`, page),
      fetchRAWGPage(`games?dates=${ago30},${fmt(today)}&ordering=-rating`, page),
      fetchRAWGPage(`games?dates=${ago90},${fmt(today)}&ordering=-added`, page),
      fetchRAWGPage(`games?dates=${fmt(today)},${next180}&ordering=-added`, page),
      fetchRAWGPage(`games?tags=free-to-play&ordering=-added`, page),
      fetchRAWGPage(`games?dates=${ago180},${fmt(today)}&ordering=-updated`, page),
      fetchRAWGPage(`games?genres=action&dates=${ago365},${fmt(today)}&ordering=-rating`, page),
      fetchRAWGPage(`games?genres=role-playing-games-rpg&dates=${ago365},${fmt(today)}&ordering=-rating`, page),
      fetchRAWGPage(`games?genres=shooter&dates=${ago365},${fmt(today)}&ordering=-rating`, page),
      fetchRAWGPage(`games?genres=racing&dates=${ago365},${fmt(today)}&ordering=-rating`, page),
      fetchRAWGPage(`games?genres=indie&dates=${ago365},${fmt(today)}&ordering=-rating`, page),
      fetchRAWGPage(`games?genres=strategy&dates=${ago365},${fmt(today)}&ordering=-rating`, page),
      fetchRAWGPage(`games?dates=2024-01-01,2024-12-31&ordering=-added`, page),
      fetchRAWGPage(`games?genres=horror&dates=${ago730},${fmt(today)}&ordering=-rating`, page),
    ]);

    // Dedupe and shuffle
    const seen = new Set();
    const dedupe = (arr) => arr.filter(g => {
      if (!g.background_image || !g.name || seen.has(g.id)) return false;
      seen.add(g.id);
      return true;
    });

    state.data.hero = (Array.isArray(hero) ? hero : []).filter(g => g.background_image).sort(() => Math.random() - 0.5);
    state.data.featured = dedupe(Array.isArray(fresh) ? fresh : []).slice(0, 6);
    state.data.newReleases = dedupe(Array.isArray(newG) ? newG : []);
    state.data.upcoming = dedupe(Array.isArray(upcoming) ? upcoming : []);
    state.data.freeGames = dedupe(Array.isArray(free) ? free : []);
    state.data.recentlyUpdated = dedupe(Array.isArray(updated) ? updated : []);
    state.data.action = dedupe(Array.isArray(action) ? action : []);
    state.data.rpg = dedupe(Array.isArray(rpg) ? rpg : []);
    state.data.shooter = dedupe(Array.isArray(shooter) ? shooter : []);
    state.data.racing = dedupe(Array.isArray(racing) ? racing : []);
    state.data.indie = dedupe(Array.isArray(indie) ? indie : []);
    state.data.strategy = dedupe(Array.isArray(strategy) ? strategy : []);
    state.data.popular2024 = dedupe(Array.isArray(pop2024) ? pop2024 : []);
    state.data.horror = dedupe(Array.isArray(horror) ? horror : []);

    const topSeen = new Set();
    state.data.top = [...state.data.newReleases, ...state.data.popular2024].filter(g => {
      if (topSeen.has(g.id)) return false;
      topSeen.add(g.id);
      return true;
    }).slice(0, 20);
  } catch(e) { console.warn('loadData:', e); }

  try {
    state.data.freeGiveaways = await giveawaysPromise;
  } catch (e) { console.warn('giveaways:', e); state.data.freeGiveaways = []; }

  state.loading = false;
  startHeroRotation();
  scheduleRender();
};

const startHeroRotation = () => {
  if (state.heroTimer) clearInterval(state.heroTimer);
  if (state.data.hero.length < 2) return;
  state.heroTimer = setInterval(() => {
    state.heroIndex = (state.heroIndex + 1) % state.data.hero.length;
    updateHero();
  }, 5000);
};

const updateHero = () => {
  const heroEl = document.getElementById('hero-banner');
  if (!heroEl) return;
  const g = state.data.hero[state.heroIndex];
  if (!g) return;
  const img = heroEl.querySelector('img');
  if (img) { img.style.animation = 'none'; img.offsetHeight; img.style.animation = 'zoomIn 0.6s var(--ease)'; img.src = g.background_image; }
  heroEl.querySelector('.hero-tag').textContent = (g.genres?.[0]?.name || 'FEATURED').toUpperCase();
  heroEl.querySelector('.hero-title').textContent = g.name;
  heroEl.querySelector('.hero-sub').textContent = g.released ? `${g.released} • ★ ${g.rating || '4.5'}/5` : 'Featured this week';
  heroEl.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === state.heroIndex));
};

const fetchGameDetail = async (id) => {
  try {
    const res = await fetch(`https://api.rawg.io/api/games/${id}?key=${RAWG_KEY}`);
    return await res.json();
  } catch { return null; }
};

// Real playable trailer clips (RAWG-hosted MP4s) — no YouTube needed when available.
const fetchGameMovies = async (id) => {
  try {
    const res = await fetch(`https://api.rawg.io/api/games/${id}/movies?key=${RAWG_KEY}`);
    if (!res.ok) return [];
    const data = await res.json();
    return Array.isArray(data.results) ? data.results : [];
  } catch { return []; }
};

// Multi-strategy search for better results on obscure games
const searchGame = async (query) => {
  const strategies = [
    `games?search=${encodeURIComponent(query)}&page_size=5`,
    `games?search=${encodeURIComponent(query)}&search_exact=true&page_size=5`,
    `games?search=${encodeURIComponent(query)}&ordering=-rating&page_size=5`,
  ];
  const results = [];
  const seen = new Set();
  for (const s of strategies) {
    const r = await fetchRAWG(s);
    if (Array.isArray(r)) {
      for (const g of r) {
        if (!seen.has(g.id) && g.name) {
          seen.add(g.id);
          results.push(g);
        }
      }
    }
    if (results.length >= 5) break;
  }
  return results[0] || null;
};

const searchGamesMulti = async (query, category = 'all') => {
  const baseFilters = category !== 'all' ? `&genres=${category}` : '';
  const strategies = [
    `games?search=${encodeURIComponent(query)}&page_size=20${baseFilters}`,
    `games?search=${encodeURIComponent(query)}&search_exact=true&page_size=20${baseFilters}`,
  ];
  const all = [];
  const seen = new Set();
  for (const s of strategies) {
    const r = await fetchRAWG(s);
    if (Array.isArray(r)) {
      for (const g of r) {
        if (!seen.has(g.id) && g.background_image) {
          seen.add(g.id);
          all.push(g);
        }
      }
    }
  }
  // Sort by relevance (name match quality)
  const q = query.toLowerCase();
  all.sort((a, b) => {
    const aMatch = a.name.toLowerCase().includes(q) ? 0 : 1;
    const bMatch = b.name.toLowerCase().includes(q) ? 0 : 1;
    if (aMatch !== bMatch) return aMatch - bMatch;
    return (b.rating || 0) - (a.rating || 0);
  });
  return all.slice(0, 20);
};

const askAI = async (userMsg) => {
  const key = storage.get('cfg')?.openrouter_key;
  if (!key) return "⚠️ No API key found. Tap Profile → Settings → API Key to add your OpenRouter key.";
  const sysPrompt = `You are Forge, a sharp, friendly gaming co-pilot. Give concise useful advice on games, builds, lore, mechanics, recommendations. Keep answers punchy (under 200 words). Use gaming terminology naturally.`;
  const msgs = [
    { role: 'system', content: sysPrompt },
    ...state.chatHistory.filter(m => m.role === 'user' || m.role === 'assistant').slice(-10).map(m => ({ role: m.role, content: m.content })),
    { role: 'user', content: userMsg }
  ];
  try {
    const res = await fetch(OPENROUTER_URL, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json', 'HTTP-Referer': 'https://playforge.app', 'X-Title': 'PlayForge' },
      body: JSON.stringify({ model: 'google/gemini-2.5-flash', messages: msgs, max_tokens: 600 })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      return `❌ API error ${res.status}: ${err.error?.message || 'Check your key in Settings.'}`;
    }
    const data = await res.json();
    return data.choices?.[0]?.message?.content || 'No response — try again.';
  } catch (e) {
    return '❌ Network error. Check your connection.';
  }
};

// =========================================================================
// DOM HELPERS
// =========================================================================
const h = (tag, props = {}, ...children) => {
  const el = document.createElement(tag);
  if (props == null || typeof props !== 'object' || Array.isArray(props) || props instanceof Node) {
    children = [props, ...children].filter(x => x != null && x !== false);
    props = {};
  }
  for (const k in props) {
    if (k.startsWith('on') && typeof props[k] === 'function') {
      el.addEventListener(k.slice(2).toLowerCase(), props[k]);
    } else if (k === 'style' && typeof props[k] === 'object') {
      Object.assign(el.style, props[k]);
    } else if (k === 'cls') {
      el.className = props[k];
    } else if (props[k] != null && props[k] !== false) {
      el.setAttribute(k, props[k]);
    }
  }
  const flat = children.flat(Infinity);
  flat.forEach(c => {
    if (c == null || c === false) return;
    if (c instanceof Node) { el.append(c); return; }
    if (typeof c === 'string' || typeof c === 'number') { el.appendChild(document.createTextNode(String(c))); return; }
    console.warn('h() got non-Node object:', c);
  });
  return el;
};
const el = (tag) => (a, ...rest) => {
  if (a == null) return h(tag);
  if (typeof a === 'string') return h(tag, { cls: a }, ...rest);
  return h(tag, a, ...rest);
};
const div  = el('div');
const span = el('span');
const p    = el('p');

const scheduleRender = () => {
  if (state.renderScheduled) return;
  state.renderScheduled = true;
  requestAnimationFrame(() => {
    state.renderScheduled = false;
    render();
  });
};

const showToast = (msg, type = 'default') => {
  state.toast = msg;
  state.toastType = type;
  renderToast();
  setTimeout(() => { state.toast = null; renderToast(); }, 2200);
};

const renderToast = () => {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  if (!state.toast) return;
  const icon = state.toastType === 'success' ? '✓' : state.toastType === 'error' ? '✗' : '';
  const t = div({ cls: 'toast' + (state.toastType !== 'default' ? ' ' + state.toastType : '') },
    icon ? span({ style: { fontWeight: 900, fontSize: '15px' } }, icon) : null,
    state.toast
  );
  document.getElementById('app').appendChild(t);
  setTimeout(() => t.classList.add('fade-out'), 1900);
};

const confetti = () => {

  for (let i = 0; i < 50; i++) {
    const piece = div({ style: {

const render = () => {
  const root = document.getElementById('app');
  // Don't re-render if detail is open and a quick property changes (e.g., progress)
  if (state.view === 'detail')   { root.innerHTML = ''; root.append(ViewDetail()); return; }
  if (state.view === 'stream')   { root.innerHTML = ''; root.append(ViewStream()); return; }
  if (state.view === 'chat')     { root.innerHTML = ''; root.append(ViewChat()); return; }
  if (state.view === 'settings') { root.innerHTML = ''; root.append(ViewSettings()); return; }
  if (state.view === 'import')   { root.innerHTML = ''; root.append(ViewImport()); return; }

  root.innerHTML = '';

  else if (state.tab === 'search') content = ViewSearch();
  else if (state.tab === 'library')content = ViewLibrary();
  else                            content = ViewProfile();
  root.append(content);
  root.append(NavBar());
  renderToast();
};

const ViewHome = () => {
  const wrap = div({ cls: 'view-wrap anim-fadeup' });

  // Hero
  if (state.data.hero.length) {
    const g = state.data.hero[state.heroIndex];
    let swipeStartX = 0, swipeStartY = 0, swipeMoved = false;
    const banner = div({
      id: 'hero-banner', cls: 'hero-banner tap',
      onClick: () => { if (!swipeMoved) openDetail(g); },
      ontouchstart: (e) => {
        swipeStartX = e.touches[0].clientX;
        swipeStartY = e.touches[0].clientY;
        swipeMoved = false;
      },
      ontouchmove: (e) => {
        const dx = e.touches[0].clientX - swipeStartX;
        const dy = e.touches[0].clientY - swipeStartY;
        if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) swipeMoved = true;
      },
      ontouchend: (e) => {
        if (!swipeMoved) return;
        const dx = e.changedTouches[0].clientX - swipeStartX;
        if (Math.abs(dx) < 40) { swipeMoved = false; return; }
        const len = state.data.hero.length;
        state.heroIndex = dx < 0
          ? (state.heroIndex + 1) % len
          : (state.heroIndex - 1 + len) % len;
        updateHero();
        startHeroRotation(); // reset the 5s auto-rotate timer after manual swipe
        setTimeout(() => { swipeMoved = false; }, 50);
      }
    },
      h('img', { src: g.background_image, alt: g.name, loading: 'eager', decoding: 'async' }),
      div('hero-overlay'),
      div({ cls: 'hero-content' },
        h('span', { cls: 'hero-tag' }, (g.genres?.[0]?.name || 'FEATURED').toUpperCase()),

const isOwned = (gameName) => {
  const n = (gameName || '').toLowerCase();
  return ['epic', 'steam', 'gog'].some(store =>
    state.owned[store].some(g => (g.name || '').toLowerCase() === n)
  );
};

const getOwningStore = (gameName) => {
  const n = (gameName || '').toLowerCase();
  for (const store of ['epic', 'steam', 'gog']) {
    if (state.owned[store].some(g => (g.name || '').toLowerCase() === n)) return store;
  }
  return null;
};

const isInWishlist = (gameName) => {
  return state.wishlist.some(g => (g.name || '').toLowerCase() === (gameName || '').toLowerCase());
};

// Robust parser that handles multiple JSON formats
const parseGameList = (text) => {
  let titles = [];
  let trimmed = text.trim();
  if (!trimmed) return titles;

  // Clean common copy-paste corruption (smart quotes, BOM, zero-width chars)
  // that can come from pasting JSON copied out of a mobile file viewer.
  trimmed = trimmed
    .replace(/^\uFEFF/, '')
    .replace(/[\u201C\u201D]/g, '"')
    .replace(/[\u2018\u2019]/g, "'")
    .replace(/[\u200B\u200C\u200D]/g, '');

  // Try JSON first
  if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
    try {
      const data = JSON.parse(trimmed);
      // Epic manifest format
      if (data.catalogItems && Array.isArray(data.catalogItems)) {
        titles = data.catalogItems.map(i => i.appName || i.displayName || i.title).filter(Boolean);
      }
      // Epic account download format
      else if (data.libraryAndPlayedGames && Array.isArray(data.libraryAndPlayedGames)) {
        titles = data.libraryAndPlayedGames.map(i => i.appName || i.title).filter(Boolean);
      }
      // Steam format
      else if (data.response && data.response.games) {
        titles = data.response.games.map(i => i.name).filter(Boolean);
      }
      // Generic array of objects
      else if (Array.isArray(data)) {
        titles = data.map(i => {
          if (typeof i === 'string') return i;
          return i.name || i.appName || i.title || i.displayName || i.game || i.app_name;
        }).filter(Boolean);
      }
      // Generic object with games array
      else if (data.games && Array.isArray(data.games)) {
        titles = data.games.map(i => i.name || i.appName || i.title).filter(Boolean);
      }
    } catch (e) {
      // Not valid JSON, fall through to line-based
    }
  }

  // If no JSON result, parse line by line
  if (!titles.length) {
    // Lines that are pure JSON syntax (braces, brackets, raw "key": value
    // pairs) should never be treated as game titles. Without this check, if
    // JSON.parse fails on slightly-corrupted pasted text (common with mobile
    // copy-paste), this fallback would turn things like "}," or
    // "appName: ABOVE" into fake "games" — flooding the library with junk.
    const looksLikeJsonSyntax = (l) =>
      /^[{}\[\],]+$/.test(l) ||                 // bare braces/brackets: {  },  [  ],
      /^"?[a-zA-Z_][\w]*"?\s*:\s*.+$/.test(l) && /^(appName|displayName|title|name|id|catalogItems|libraryAndPlayedGames|games|response|app_name)\s*:/i.test(l); // key: value lines using known manifest field names

    titles = text.split(/[\n\r]+/)
      .map(l => l.replace(/^[-•*\d.\s'"`]+/, '').replace(/["'`]/g, '').trim())
      .filter(l => l.length > 0 && l.length < 200)
      .filter(l => !looksLikeJsonSyntax(l));

    // If most lines got filtered out as JSON syntax, the source was
    // almost certainly a corrupted JSON paste, not a real plain-text list.
    // Bail out with nothing rather than import a handful of mangled titles.
    const rawLineCount = text.split(/[\n\r]+/).filter(l => l.trim().length > 0).length;
    if (rawLineCount > 5 && titles.length < rawLineCount * 0.3) {
      titles = [];
    }
  }

  return titles;
};

const handleFileImport = (e, store) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    const titles = parseGameList(reader.result);
    if (!titles.length) { showToast('No game titles found in file', 'error'); return; }
    await startImport(titles, store);
  };
  reader.readAsText(file);
};

const importFromText = async (store) => {
  const text = document.getElementById('import-text')?.value?.trim();
  if (!text) { showToast('Paste your games first', 'error'); return; }
  const titles = parseGameList(text);
  if (!titles.length) { showToast('No titles detected', 'error'); return; }
  await startImport(titles, store);
};

const startImport = async (titles, store) => {
  // Filter out duplicates
  const existing = new Set(state.owned[store].map(g => (g.name || '').toLowerCase()));
  const toAdd = titles.filter(t => !existing.has(t.toLowerCase())).slice(0, 5000);

  if (!toAdd.length) { showToast('All games already imported', 'default'); return; }

  // Initialize progress
  state.importProgress = {
    total: toAdd.length,
    done: 0,
    success: 0,
    failed: 0,
    current: '',
    store: store,
    cancelled: false,
    startTime: Date.now(),
  };
  scheduleRender();

  // Process in batches with progress updates
  const BATCH_SIZE = 5;
  for (let i = 0; i < toAdd.length; i += BATCH_SIZE) {
    if (state.importProgress.cancelled) break;
    const batch = toAdd.slice(i, i + BATCH_SIZE);
    const promises = batch.map(async (title) => {
      if (state.importProgress.cancelled) return null;
      state.importProgress.current = title;
      scheduleRender();
      try {
        const rawg = await searchGame(title);
        state.importProgress.done++;
        if (rawg) {
          state.importProgress.success++;
          return {
            name: title,
            _store: store,
            _rawgId: rawg.id,
            background_image: rawg.background_image || null,
            rating: rawg.rating || null,
            released: rawg.released || null,
            genres: rawg.genres || [],
            addedAt: Date.now(),
          };
        } else {
          // Still add even without RAWG match
          state.importProgress.success++;
          return {
            name: title,
            _store: store,
            background_image: null,
            genres: [],
            addedAt: Date.now(),
          };
        }
      } catch {
        state.importProgress.failed++;
        state.importProgress.done++;
        return null;
      }
    });
    const results = await Promise.all(promises);
    const valid = results.filter(Boolean);
    state.owned[store] = [...valid, ...state.owned[store]];
    saveOwned(store);
    scheduleRender();
  }

  if (!state.importProgress.cancelled) {
    confetti();
    showToast(`✓ Imported ${state.importProgress.success} games!`, 'success');
    setTimeout(() => {
      state.importProgress = null;
      state.view = null;
      state.tab = 'library';
      state.libraryTab = 'owned';
      state.ownedFilter = store;
      scheduleRender();
    }, 1500);
  } else {
    showToast('Import cancelled', 'default');
    setTimeout(() => {
      state.importProgress = null;
      state.view = null;
      scheduleRender();
    }, 800);
  }
};

              });

          div({ style: { display: 'flex', flexWrap: 'wrap', gap: '6px' } },
            ...['Horror', 'Sci-fi', 'Cyberpunk', 'Medieval', 'Zombies', 'Space', 'Open World', 'Souls-like', 'Co-op', 'Roguelike'].map(tag => {

const exportAllData = () => {

const openDetail = async (g) => {
  state.activeGame = g;
  state.relatedGames = [];
  state.activeGameVideos = [];
  state.view = 'detail';
  scheduleRender();
  // Fetch full detail + related games + real trailer clips together, then render ONCE.
  // (Previously each fetch triggered its own full re-render, causing
  // the page to visibly rebuild/jitter 2-3 times on open.)
  const detailId = g._rawgId || (!g._store ? g.id : null);
  const wantsDetail = !!detailId && !g.description;
  const genreSlug = g.genres?.[0]?.slug;

  const [full, related, movies] = await Promise.all([
    wantsDetail ? fetchGameDetail(detailId) : Promise.resolve(null),
    genreSlug ? fetchRAWG(`games?genres=${genreSlug}&exclude=${g.id || g._rawgId}&page_size=10`) : Promise.resolve([]),
    detailId ? fetchGameMovies(detailId) : Promise.resolve([])
  ]);

  // Bail out silently if the user already navigated away from this game
  if (state.view !== 'detail' || state.activeGame?.name !== g.name) return;

  if (full) state.activeGame = { ...g, ...full };
  state.relatedGames = (Array.isArray(related) ? related : [])
    .filter(r => r.background_image && r.id !== (g.id || g._rawgId))
    .slice(0, 8);
  state.activeGameVideos = movies;
  scheduleRender();
};

// Plays a real RAWG-hosted MP4 trailer inline, in-app — no YouTube, no redirect.
const openVideoPlayer = (videoData) => {
  const src = videoData?.data?.max || videoData?.data?.['480'];
  if (!src) { showToast('No playable video found', 'error'); return; }
  const overlay = div({ cls: 'video-modal-overlay tap', onClick: (e) => { if (e.target === overlay) closeVideoPlayer(); } });
  const box = div({ cls: 'video-modal-box' });
  const vid = h('video', { src, controls: 'true', autoplay: 'true', playsinline: 'true', style: { width: '100%', height: '100%', borderRadius: '12px', background: '#000' } });
  const closeBtn = h('button', { cls: 'icon-btn tap', style: { position: 'absolute', top: '-44px', right: '0' }, onClick: closeVideoPlayer }, svg('x', 20, { color: 'white' }));
  box.append(vid, closeBtn);
  overlay.append(box);
  document.getElementById('app').appendChild(overlay);
};
const closeVideoPlayer = () => {
  const el = document.querySelector('.video-modal-overlay');
  if (el) { el.querySelector('video')?.pause(); el.remove(); }
};

const launchGame = (g) => {
  const store = getOwningStore(g.name);
  let url = null;
  if (store === 'epic') url = 'com.epicgames.launcher://apps/' + (g._rawgId || '') + '?action=launch&silent=true';
  else if (store === 'steam') url = 'steam://run/' + (g._rawgId || '');
  else if (store === 'gog') url = 'https://www.gog.com/launcher';
  if (url) {
    showToast(`Launching ${g.name}...`, 'success');
    setTimeout(() => window.open(url, '_blank'), 300);
  } else {
    showToast('No launcher found', 'error');
  }
};
