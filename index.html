<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OmniNexus Gaming OS</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for parsing JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Maps for React and Lucide Icons -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0"
      }
    }
  </script>
</head>
<body class="bg-[#050505] text-white overflow-x-hidden m-0 p-0">
  <div id="root"></div>

  <!-- Note data-type="module" ensures ES imports work -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      Home, Library, User, Search, Flame, Play, Star,
      Gamepad2, ChevronLeft, Heart, Trophy, Shield,
      Sparkles, X, Upload, Terminal, MessageSquare, Loader2,
      DownloadCloud, Compass, Zap, TrendingUp, Clock, Bot,
      Send, Filter, ChevronRight, Award, Target, Swords,
      BarChart2, Globe, Cpu, Crosshair, Plus, Check, Trash2,
      Volume2, VolumeX, RefreshCw, AlertCircle, ChevronDown
    } from 'lucide-react';

    // ─── CONFIG ────────────────────────────────────────────────────────────────
    const RAWG_KEY = '2d783ae8db664cc6a701077e074fcaf6';
    const RAWG = 'https://api.rawg.io/api';

    // ─── PHYSICS & STYLES ──────────────────────────────────────────────────────
    const PhysicsStyles = () => (
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        :root{
          --cyan:#00f0ff;--pink:#ff007f;--purple:#7000ff;--gold:#ffd700;
          --bg:#050505;--glass:rgba(10,10,18,0.7);--border:rgba(255,255,255,0.08);
          --spring:cubic-bezier(0.34,1.56,0.64,1);
        }
        body{background:#050505;color:#fff;margin:0;font-family:'Inter',sans-serif;overscroll-behavior:none;}
        .font-orb{font-family:'Orbitron',monospace;}
        .hide-scroll{scrollbar-width:none;-ms-overflow-style:none;}
        .hide-scroll::-webkit-scrollbar{display:none;}
        .glass{background:var(--glass);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--border);}
        .neon-c{box-shadow:0 0 20px var(--cyan),inset 0 0 8px rgba(0,240,255,0.1);border:1px solid var(--cyan);}
        .neon-p{box-shadow:0 0 20px var(--pink),inset 0 0 8px rgba(255,0,127,0.1);border:1px solid var(--pink);}
        .neon-v{box-shadow:0 0 20px var(--purple),inset 0 0 8px rgba(112,0,255,0.1);border:1px solid var(--purple);}
        .neon-g{box-shadow:0 0 20px var(--gold),inset 0 0 8px rgba(255,215,0,0.1);border:1px solid var(--gold);}
        @keyframes orb{0%{transform:translate(0,0) scale(1);}50%{transform:translate(15vw,-8vh) scale(1.08);}100%{transform:translate(-8vw,12vh) scale(0.94);}}
        .orb{position:fixed;border-radius:50%;filter:blur(100px);z-index:0;opacity:0.28;animation:orb 18s infinite ease-in-out alternate;pointer-events:none;}
        @keyframes springUp{0%{transform:translateY(60px) scale(0.94);opacity:0;}60%{transform:translateY(-4px) scale(1.02);opacity:1;}100%{transform:translateY(0) scale(1);opacity:1;}}
        .spring-up{animation:springUp 0.5s var(--spring) forwards;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        .fade-in{animation:fadeIn 0.4s ease forwards;}
        .bounce{transition:transform 0.2s var(--spring);}
        .bounce:active{transform:scale(0.88);}
        @keyframes pulse-glow{0%,100%{box-shadow:0 0 15px var(--cyan);}50%{box-shadow:0 0 35px var(--cyan),0 0 60px rgba(0,240,255,0.3);}}
        .pulse-glow{animation:pulse-glow 2s infinite;}
        @keyframes scan{0%{transform:translateY(-100%);}100%{transform:translateY(400px);}}
        .scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scan 2s linear infinite;}
        @keyframes rotate360{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
        .spin{animation:rotate360 1s linear infinite;}
        @keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
        .shimmer{background:linear-gradient(90deg,rgba(255,255,255,0.05) 25%,rgba(255,255,255,0.12) 50%,rgba(255,255,255,0.05) 75%);background-size:200% auto;animation:shimmer 1.5s linear infinite;}
        .chat-msg{animation:fadeIn 0.3s ease forwards;}
        .video-bg{pointer-events:none;}
        .line-clamp-1{overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;}
        .line-clamp-2{overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
        .snap-x{scroll-snap-type:x mandatory;}
        .snap-start{scroll-snap-align:start;}
        .no-select{user-select:none;-webkit-user-select:none;}
        @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
        .float{animation:float 3s ease-in-out infinite;}
        @keyframes matrix-in{0%{opacity:0;transform:scaleY(0);}100%{opacity:1;transform:scaleY(1);}}
        .matrix-in{animation:matrix-in 0.2s var(--spring) forwards;transform-origin:top;}
        @keyframes rank-pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
        .rank-1{color:var(--gold);text-shadow:0 0 10px var(--gold);}
        .rank-2{color:#c0c0c0;text-shadow:0 0 10px #c0c0c0;}
        .rank-3{color:#cd7f32;text-shadow:0 0 10px #cd7f32;}
        input,textarea{font-family:'Inter',sans-serif;}
        :focus{outline:none;}
        @keyframes bars{0%,100%{transform:scaleY(0.4);}50%{transform:scaleY(1);}}
        .bar-1{animation:bars 0.8s ease infinite;}
        .bar-2{animation:bars 0.8s ease infinite 0.2s;}
        .bar-3{animation:bars 0.8s ease infinite 0.4s;}
      `}</style>
    );

    const vib = (ms = 25) => navigator.vibrate?.(ms);

    // ─── AI HOOK ───────────────────────────────────────────────────────────────
    const useAI = () => {
      const ask = useCallback(async (messages, system = '') => {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: system || 'You are NexusAI, a gaming expert assistant inside OmniNexus — a next-gen game tracker. Be concise, enthusiastic, and knowledgeable. Keep responses under 3 sentences unless asked for more. Use gaming terminology naturally.',
            messages
          })
        });
        const data = await res.json();
        return data.content?.[0]?.text || 'Signal lost. Try again.';
      }, []);
      return { ask };
    };

    // ─── SKELETON CARD ─────────────────────────────────────────────────────────
    const SkeletonCard = () => (
      <div className="min-w-[150px] w-[150px]">
        <div className="aspect-[3/4] rounded-[2rem] shimmer mb-3" />
        <div className="h-3 rounded shimmer mb-1" />
        <div className="h-3 rounded shimmer w-2/3" />
      </div>
    );

    // ─── GAME CARD ─────────────────────────────────────────────────────────────
    const GameCard = ({ game, onClick, rank }) => (
      <div onClick={() => { vib(30); onClick(game); }} className="min-w-[150px] w-[150px] snap-start bounce no-select cursor-pointer">
        <div className="relative aspect-[3/4] rounded-[2rem] overflow-hidden mb-2 border border-white/8 shadow-xl">
          {game.background_image
            ? <img src={game.background_image} className="w-full h-full object-cover" loading="lazy" />
            : <div className="w-full h-full shimmer" />}
          {rank && (
            <div className={`absolute top-2 left-2 w-8 h-8 rounded-full glass flex items-center justify-center text-sm font-black font-orb ${rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'text-white/60'}`}>
              {rank}
            </div>
          )}
          <div className="absolute bottom-2 left-2 right-2 glass rounded-xl p-1.5 flex justify-center items-center gap-1">
            <Star size={9} className="text-[var(--gold)] fill-[var(--gold)]" />
            <span className="text-xs font-bold text-white">{game.rating?.toFixed(1) || '—'}</span>
          </div>
        </div>
        <h3 className="text-sm font-bold text-white/90 line-clamp-1 px-1">{game.name}</h3>
        {game.genres?.[0] && <p className="text-[10px] text-white/40 px-1 mt-0.5">{game.genres[0].name}</p>}
      </div>
    );

    // ─── SHELF ─────────────────────────────────────────────────────────────────
    const Shelf = ({ title, data, icon: Icon, color, onGameClick, loading, ranked }) => (
      <div className="mt-8">
        <div className="px-6 flex items-center justify-between mb-4">
          <h2 className="text-lg font-black flex items-center gap-2 text-white font-orb">
            <Icon className={color} size={18} /> {title}
          </h2>
          <ChevronRight size={16} className="text-white/30" />
        </div>
        <div className="flex gap-4 px-6 overflow-x-auto hide-scroll snap-x pb-2">
          {loading
            ? Array(5).fill(0).map((_, i) => <SkeletonCard key={i} />)
            : data.map((game, i) => <GameCard key={game.id} game={game} onClick={onGameClick} rank={ranked ? i + 1 : null} />)}
        </div>
      </div>
    );

    // ─── GENRE PILL ────────────────────────────────────────────────────────────
    const GenrePill = ({ label, active, onClick }) => (
      <button
        onClick={onClick}
        className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all bounce ${
          active ? 'bg-[var(--cyan)] text-black shadow-[0_0_15px_var(--cyan)]' : 'glass text-white/60 border border-white/10'
        }`}
      >{label}</button>
    );

    // ─── HOME ──────────────────────────────────────────────────────────────────
    const HomeView = ({ games, loading, onGameClick }) => {
      const heroGames = games.trending.slice(0, 5);

      return (
        <div className="pb-32 spring-up pt-4">
          <div className="relative w-full h-[58vh] flex overflow-x-auto snap-x hide-scroll px-4 gap-4">
            {loading
              ? <div className="min-w-full h-full rounded-[2.5rem] shimmer" />
              : heroGames.map((game) => (
                <div
                  key={game.id}
                  className="min-w-full h-full relative snap-start rounded-[2.5rem] overflow-hidden bounce cursor-pointer no-select"
                  onClick={() => onGameClick(game, 'stream')}
                >
                  {game.background_image
                    ? <img src={game.background_image} className="w-full h-full object-cover" />
                    : <div className="w-full h-full bg-[#111]" />}
                  <div className="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/30 to-transparent" />
                  <div className="absolute top-6 left-6 flex gap-2 items-center">
                    <span className="bg-[var(--pink)] text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-[0_0_12px_var(--pink)] animate-pulse">● Live</span>
                    {game.metacritic && (
                      <span className="glass px-3 py-1 rounded-full text-[10px] font-black text-[var(--gold)]">MC {game.metacritic}</span>
                    )}
                  </div>
                  <div className="absolute bottom-8 left-6 right-6">
                    <h1 className="text-3xl font-black text-white leading-none mb-1 drop-shadow-2xl font-orb">{game.name}</h1>
                    <p className="text-white/50 text-sm mb-4">{game.genres?.map(g => g.name).join(' · ') || 'Action'}</p>
                    <div className="flex gap-3">
                      <button
                        onClick={(e) => { e.stopPropagation(); vib(40); onGameClick(game, 'stream'); }}
                        className="flex-1 bg-white text-black font-black py-3 rounded-2xl flex items-center justify-center gap-2 text-sm shadow-[0_0_20px_rgba(255,255,255,0.3)] bounce"
                      >
                        <Play size={16} fill="black" /> Watch Stream
                      </button>
                      <button
                        onClick={(e) => { e.stopPropagation(); vib(30); onGameClick(game, 'detail'); }}
                        className="glass px-4 py-3 rounded-2xl text-sm font-bold text-[var(--cyan)] bounce border border-[var(--cyan)]/40"
                      >
                        Info
                      </button>
                    </div>
                  </div>
                </div>
              ))}
          </div>

          <div className="flex justify-center gap-1.5 mt-3 mb-2">
            {heroGames.map((_, i) => (
              <div key={i} className={`rounded-full transition-all ${i === 0 ? 'w-4 h-1.5 bg-[var(--cyan)]' : 'w-1.5 h-1.5 bg-white/20'}`} />
            ))}
          </div>

          <Shelf title="Trending Now" data={games.trending} icon={Flame} color="text-[var(--pink)]" onGameClick={(g) => onGameClick(g, 'detail')} loading={loading} />
          <Shelf title="Upcoming Releases" data={games.upcoming} icon={Clock} color="text-[var(--cyan)]" onGameClick={(g) => onGameClick(g, 'detail')} loading={loading} />
          <Shelf title="Hall of Fame" data={games.top} icon={Trophy} color="text-[var(--gold)]" onGameClick={(g) => onGameClick(g, 'detail')} loading={loading} ranked />
        </div>
      );
    };

    // ─── EXPLORE ───────────────────────────────────────────────────────────────
    const ExploreView = ({ onGameClick }) => {
      const [genre, setGenre] = useState('');
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [platform, setPlatform] = useState('');

      const GENRES = ['Action', 'RPG', 'Shooter', 'Strategy', 'Horror', 'Indie', 'Sports', 'Racing', 'Adventure', 'Simulation'];
      const PLATFORMS = [{ id: '', label: 'All' }, { id: '4', label: 'PC' }, { id: '18', label: 'PS4' }, { id: '187', label: 'PS5' }, { id: '1', label: 'Xbox' }, { id: '7', label: 'Switch' }];

      const fetch_games = useCallback(async (g, p) => {
        setLoading(true);
        try {
          let url = `${RAWG}/games?key=${RAWG_KEY}&page_size=20&ordering=-rating`;
          if (g) url += `&genres=${g.toLowerCase()}`;
          if (p) url += `&platforms=${p}`;
          const res = await fetch(url);
          const data = await res.json();
          setResults(data.results || []);
        } catch { setResults([]); }
        setLoading(false);
      }, []);

      useEffect(() => { fetch_games(genre, platform); }, [genre, platform]);

      return (
        <div className="pt-12 pb-32 spring-up min-h-screen">
          <div className="px-6 mb-4">
            <h1 className="text-3xl font-black text-white font-orb">Explore</h1>
            <p className="text-white/40 text-sm mt-1">Discover your next obsession</p>
          </div>

          <div className="flex gap-2 px-6 overflow-x-auto hide-scroll pb-2 mb-3">
            {PLATFORMS.map(p => (
              <GenrePill key={p.id} label={p.label} active={platform === p.id} onClick={() => { vib(); setPlatform(p.id); }} />
            ))}
          </div>

          <div className="flex gap-2 px-6 overflow-x-auto hide-scroll pb-4">
            <GenrePill label="All" active={!genre} onClick={() => { vib(); setGenre(''); }} />
            {GENRES.map(g => (
              <GenrePill key={g} label={g} active={genre === g} onClick={() => { vib(); setGenre(g); }} />
            ))}
          </div>

          <div className="grid grid-cols-2 gap-4 px-4">
            {loading
              ? Array(8).fill(0).map((_, i) => (
                <div key={i} className="glass rounded-[2rem] overflow-hidden">
                  <div className="aspect-video shimmer" />
                  <div className="p-3">
                    <div className="h-3 shimmer rounded mb-2" />
                    <div className="h-3 shimmer rounded w-2/3" />
                  </div>
                </div>
              ))
              : results.map(game => (
                <div
                  key={game.id}
                  onClick={() => { vib(30); onGameClick(game, 'detail'); }}
                  className="glass rounded-[2rem] overflow-hidden bounce cursor-pointer border border-white/5"
                >
                  <div className="aspect-video relative">
                    {game.background_image
                      ? <img src={game.background_image} className="w-full h-full object-cover" loading="lazy" />
                      : <div className="w-full h-full bg-[#111]" />}
                    <div className="absolute bottom-2 right-2 glass rounded-lg px-2 py-0.5 flex items-center gap-1">
                      <Star size={9} className="text-[var(--gold)] fill-[var(--gold)]" />
                      <span className="text-[10px] font-bold">{game.rating?.toFixed(1) || '—'}</span>
                    </div>
                  </div>
                  <div className="p-3">
                    <h3 className="font-bold text-sm text-white line-clamp-1">{game.name}</h3>
                    <p className="text-[10px] text-white/40 mt-0.5">{game.genres?.[0]?.name || 'Game'}</p>
                  </div>
                </div>
              ))}
          </div>
        </div>
      );
    };

    // ─── SEARCH ────────────────────────────────────────────────────────────────
    const SearchView = ({ onGameClick }) => {
      const [q, setQ] = useState('');
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [searched, setSearched] = useState(false);
      const inputRef = useRef(null);

      useEffect(() => { inputRef.current?.focus(); }, []);

      const doSearch = useCallback(async (query) => {
        if (!query.trim()) { setResults([]); setSearched(false); return; }
        setLoading(true); setSearched(true);
        try {
          const res = await fetch(`${RAWG}/games?key=${RAWG_KEY}&search=${encodeURIComponent(query)}&page_size=15`);
          const data = await res.json();
          setResults(data.results || []);
        } catch { setResults([]); }
        setLoading(false);
      }, []);

      useEffect(() => {
        const t = setTimeout(() => doSearch(q), 500);
        return () => clearTimeout(t);
      }, [q]);

      return (
        <div className="pt-12 pb-32 spring-up min-h-screen">
          <div className="px-4 mb-4">
            <h1 className="text-3xl font-black text-white font-orb px-2 mb-4">Search</h1>
            <div className="glass rounded-2xl flex items-center gap-3 px-4 py-3.5 border border-white/10 focus-within:border-[var(--cyan)] transition-colors">
              <Search size={18} className="text-white/40 shrink-0" />
              <input
                ref={inputRef}
                value={q}
                onChange={e => setQ(e.target.value)}
                placeholder="Search any game..."
                className="flex-1 bg-transparent text-white placeholder:text-white/30 text-sm"
              />
              {q && (
                <button onClick={() => { setQ(''); setResults([]); setSearched(false); }}>
                  <X size={16} className="text-white/40" />
                </button>
              )}
            </div>
          </div>

          {loading && (
            <div className="flex justify-center py-12">
              <div className="w-10 h-10 border-2 border-[var(--cyan)] border-t-transparent rounded-full spin" />
            </div>
          )}

          {!loading && searched && results.length === 0 && (
            <div className="text-center py-20 text-white/30">
              <AlertCircle size={40} className="mx-auto mb-3 opacity-40" />
              <p>No results for "{q}"</p>
            </div>
          )}

          {!loading && !searched && (
            <div className="px-6 py-4 text-center">
              <Crosshair size={48} className="mx-auto mb-4 text-white/10" />
              <p className="text-white/30 text-sm">Start typing to search millions of games</p>
            </div>
          )}

          <div className="px-4 space-y-3">
            {results.map((game, i) => (
              <div
                key={game.id}
                onClick={() => { vib(30); onGameClick(game, 'detail'); }}
                className="glass rounded-2xl flex gap-3 p-3 bounce cursor-pointer border border-white/5 fade-in"
                style={{ animationDelay: `${i * 40}ms` }}
              >
                <div className="w-20 h-20 rounded-xl overflow-hidden shrink-0">
                  {game.background_image
                    ? <img src={game.background_image} className="w-full h-full object-cover" loading="lazy" />
                    : <div className="w-full h-full shimmer" />}
                </div>
                <div className="flex-1 min-w-0">
                  <h3 className="font-bold text-white line-clamp-1">{game.name}</h3>
                  <p className="text-[11px] text-white/40 mt-0.5">{game.genres?.map(g => g.name).join(', ') || '—'}</p>
                  <div className="flex items-center gap-3 mt-2">
                    <div className="flex items-center gap-1">
                      <Star size={10} className="text-[var(--gold)] fill-[var(--gold)]" />
                      <span className="text-xs font-bold text-[var(--gold)]">{game.rating?.toFixed(1) || '—'}</span>
                    </div>
                    {game.metacritic && (
                      <span className="text-xs font-bold text-[var(--cyan)]">MC {game.metacritic}</span>
                    )}
                    {game.released && (
                      <span className="text-[10px] text-white/30">{game.released?.slice(0, 4)}</span>
                    )}
                  </div>
                </div>
                <ChevronRight size={16} className="text-white/20 self-center shrink-0" />
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ─── GAME DETAIL ───────────────────────────────────────────────────────────
    const GameDetailModal = ({ game, onClose, onStream, onAddVault, inVault }) => {
      const [screenshots, setScreenshots] = useState([]);
      const [details, setDetails] = useState(null);
      const [aiReview, setAiReview] = useState('');
      const [aiLoading, setAiLoading] = useState(false);
      const { ask } = useAI();

      useEffect(() => {
        const load = async () => {
          try {
            const [ssRes, detRes] = await Promise.all([
              fetch(`${RAWG}/games/${game.id}/screenshots?key=${RAWG_KEY}`),
              fetch(`${RAWG}/games/${game.id}?key=${RAWG_KEY}`)
            ]);
            const ss = await ssRes.json();
            const det = await detRes.json();
            setScreenshots(ss.results?.slice(0, 6) || []);
            setDetails(det);
          } catch {}
        };
        load();
      }, [game.id]);

      const getAiReview = async () => {
        setAiLoading(true);
        const text = await ask([{
          role: 'user',
          content: `Give me a punchy 2-sentence expert review of "${game.name}" (Rating: ${game.rating}/5, Metacritic: ${game.metacritic || 'N/A'}). Be specific and opinionated.`
        }]);
        setAiReview(text);
        setAiLoading(false);
      };

      const platforms = game.platforms?.slice(0, 4).map(p => p.platform.name) || [];
      const tags = game.tags?.slice(0, 6) || [];
      const genres = game.genres || [];

      return (
        <div className="fixed inset-0 z-50 bg-[#050505] flex flex-col spring-up overflow-hidden">
          <div className="relative h-[38vh] w-full shrink-0">
            {game.background_image
              ? <img src={game.background_image} className="w-full h-full object-cover" />
              : <div className="w-full h-full bg-[#111]" />}

          <div className="grid grid-cols-3 gap-3 mb-6">
            {[
              { label: 'Games', value: vault.length, icon: Gamepad2, color: 'text-[var(--cyan)]' },
              { label: 'Platforms', value: Object.values(connectedAccounts).filter(Boolean).length, icon: Globe, color: 'text-[var(--pink)]' },
              { label: 'Score', value: `${(vault.reduce((a, g) => a + (g.rating || 0), 0) / Math.max(1, vault.length)).toFixed(1)}`, icon: Star, color: 'text-[var(--gold)]' },
            ].map(s => (
              <div key={s.label} className="glass rounded-2xl p-4 text-center border border-white/5">
                <s.icon size={18} className={`${s.color} mx-auto mb-2`} />
                <p className="font-black text-white text-lg">{s.value}</p>
                <p className="text-[9px] text-white/40 uppercase tracking-wider">{s.label}</p>
              </div>
            ))}
          </div>

          <h3 className="text-base font-bold text-white mb-3">Core Integrations</h3>
          <div className="space-y-3">
            <div className="glass p-4 rounded-[2rem] flex items-center justify-between border border-white/5 overflow-hidden relative">
              {syncingPlatform === 'steam' && (
                <div className="absolute inset-0 bg-[var(--cyan)]/10 backdrop-blur-sm flex items-center justify-center z-10">
                  <div className="w-5 h-5 border-2 border-[var(--cyan)] border-t-transparent rounded-full spin mr-2" />
                  <span className="text-[var(--cyan)] font-bold text-sm tracking-widest font-orb">EXTRACTING DATA...</span>
                </div>
              )}
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 bg-[#1b2838] rounded-full flex items-center justify-center border border-white/10">
                  <Gamepad2 className="text-white" size={20} />
                </div>
                <div>
                  <h3 className="font-bold text-white text-sm">Steam</h3>
                  <p className={`text-xs font-bold ${connectedAccounts.steam ? 'text-[var(--cyan)]' : 'text-white/30'}`}>
                    {connectedAccounts.steam ? '✓ Vault Synced' : 'Offline'}
                  </p>
                </div>
              </div>
              <button
                onClick={() => onConnect('steam')}
                disabled={syncingPlatform !== null}
                className={`px-5 py-2 rounded-xl text-sm font-bold bounce ${connectedAccounts.steam ? 'glass text-white border border-white/10' : 'bg-[var(--cyan)] text-black shadow-[0_0_15px_var(--cyan)]'}`}
              >
                {connectedAccounts.steam ? 'Disconnect' : 'Connect'}
              </button>
            </div>

            <div className="glass p-4 rounded-[2rem] flex items-center justify-between border border-white/5 overflow-hidden relative">
              {syncingPlatform === 'epic' && (
                <div className="absolute inset-0 bg-[var(--pink)]/10 backdrop-blur-sm flex items-center justify-center z-10">
                  <div className="w-5 h-5 border-2 border-[var(--pink)] border-t-transparent rounded-full spin mr-2" />
                  <span className="text-[var(--pink)] font-bold text-sm tracking-widest font-orb">EXTRACTING DATA...</span>
                </div>
              )}
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 bg-black rounded-full flex items-center justify-center border border-white/10">
                  <Shield className="text-white" size={20} />
                </div>
                <div>
                  <h3 className="font-bold text-white text-sm">Epic Games</h3>
                  <p className={`text-xs font-bold ${connectedAccounts.epic ? 'text-[var(--pink)]' : 'text-white/30'}`}>
                    {connectedAccounts.epic ? '✓ Vault Synced' : 'Offline'}
                  </p>
                </div>
              </div>
              <button
                onClick={() => onConnect('epic')}
                disabled={syncingPlatform !== null}
                className={`px-5 py-2 rounded-xl text-sm font-bold bounce ${connectedAccounts.epic ? 'glass text-white border border-white/10' : 'bg-[var(--pink)] text-white shadow-[0_0_15px_var(--pink)]'}`}
              >
                {connectedAccounts.epic ? 'Disconnect' : 'Connect'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ─── BULK IMPORT ───────────────────────────────────────────────────────────
    const BulkImportModal = ({ onImport, onClose }) => {
      const [text, setText] = useState('');
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-black/80 backdrop-blur-sm spring-up">
          <div className="w-full max-w-lg glass neon-c rounded-[2.5rem] p-6 shadow-[0_0_40px_rgba(0,240,255,0.15)]">
            <div className="flex justify-between items-center mb-5">
              <h3 className="text-xl font-black text-white flex items-center gap-2 font-orb">
                <Terminal size={18} className="text-[var(--cyan)]" /> Data Injection
              </h3>
              <button onClick={onClose} className="w-8 h-8 glass rounded-full flex items-center justify-center text-white bounce"><X size={14} /></button>
            </div>
            <textarea
              className="w-full h-48 bg-black/60 border border-white/10 rounded-2xl p-4 text-white placeholder:text-white/20 focus:border-[var(--cyan)] resize-none font-mono text-sm transition-colors"
              placeholder={"Paste game titles, one per line:\nElden Ring\nHades\nCyberpunk 2077\nHollow Knight"}
              value={text}
              onChange={e => setText(e.target.value)}
              autoFocus
            />
            <button
              onClick={() => { vib(50); onImport(text); }}
              disabled={!text.trim()}
              className="w-full mt-4 bg-[var(--cyan)] text-black font-black py-4 rounded-2xl bounce shadow-[0_0_20px_var(--cyan)] disabled:opacity-30"
            >
              Execute Import ({text.split('\n').filter(l => l.trim()).length} titles)
            </button>
          </div>
        </div>
      );
    };

    // ─── AI ASSISTANT MODAL ────────────────────────────────────────────────────
    const AIAssistantModal = ({ onClose }) => {
      const [messages, setMessages] = useState([
        { role: 'assistant', content: "Hey! I'm NexusAI 🎮 Ask me anything — game recommendations, reviews, tips, or what to play next." }
      ]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const { ask } = useAI();
      const chatRef = useRef(null);

      const send = async () => {
        if (!input.trim() || loading) return;
        vib(30);
        const userMsg = { role: 'user', content: input };
        const newHistory = [...messages, userMsg];
        setMessages(newHistory);
        setInput('');
        setLoading(true);
        setTimeout(() => chatRef.current?.scrollTo({ top: 99999, behavior: 'smooth' }), 50);

        const apiMessages = newHistory.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content }));
        const reply = await ask(apiMessages);
        setMessages([...newHistory, { role: 'assistant', content: reply }]);
        setLoading(false);
        setTimeout(() => chatRef.current?.scrollTo({ top: 99999, behavior: 'smooth' }), 50);
      };

      const QUICK = ['What should I play tonight?', 'Best RPGs of 2024?', 'Hidden gem recommendations', 'Compare Elden Ring vs Dark Souls'];

      return (
        <div className="fixed inset-0 z-50 bg-[#050505] flex flex-col spring-up">
          <div className="glass px-6 py-5 border-b border-white/8 flex items-center gap-3 shrink-0">
            <button onClick={() => { vib(); onClose(); }} className="w-10 h-10 glass rounded-full flex items-center justify-center text-white bounce">
              <ChevronLeft size={20} />
            </button>
            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-[var(--purple)] to-[var(--cyan)] flex items-center justify-center">
              <Bot size={20} />
            </div>
            <div>
              <h2 className="font-black text-white font-orb">NexusAI</h2>
              <p className="text-[10px] text-[var(--cyan)]">Gaming Intelligence · Online</p>
            </div>
          </div>

          <div ref={chatRef} className="flex-1 overflow-y-auto hide-scroll p-5 space-y-4">
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} fade-in`}>
                {m.role === 'assistant' && (
                  <div className="w-8 h-8 rounded-full bg-gradient-to-br from-[var(--purple)] to-[var(--cyan)] flex items-center justify-center mr-2 shrink-0 self-end">
                    <Bot size={14} />
                  </div>
                )}
                <div className={`max-w-[80%] rounded-2xl px-4 py-3 text-sm leading-relaxed ${
                  m.role === 'user'
                    ? 'bg-[var(--purple)] text-white rounded-br-md'
                    : 'glass text-white/90 border border-white/8 rounded-bl-md'
                }`}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex justify-start">
                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-[var(--purple)] to-[var(--cyan)] flex items-center justify-center mr-2">
                  <Bot size={14} />
                </div>
                <div className="glass rounded-2xl rounded-bl-md px-4 py-3 border border-white/8 flex items-center gap-1">
                  <div className="w-2 h-2 bg-[var(--cyan)] rounded-full animate-bounce" />
                  <div className="w-2 h-2 bg-[var(--cyan)] rounded-full animate-bounce" style={{ animationDelay: '0.15s' }} />
                  <div className="w-2 h-2 bg-[var(--cyan)] rounded-full animate-bounce" style={{ animationDelay: '0.3s' }} />
                </div>
              </div>
            )}

            {messages.length === 1 && (
              <div className="grid grid-cols-2 gap-2 mt-4">
                {QUICK.map((q, i) => (
                  <button
                    key={i}
                    onClick={() => { setInput(q); }}
                    className="glass rounded-xl p-3 text-left text-xs text-white/60 border border-white/8 bounce"
                  >{q}</button>
                ))}
              </div>
            )}
          </div>

          <div className="glass border-t border-white/8 p-4 flex gap-3 shrink-0">
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && send()}
              placeholder="Ask NexusAI anything..."
              className="flex-1 bg-white/5 border border-white/10 rounded-full px-4 py-3 text-sm text-white placeholder:text-white/20 focus:border-[var(--purple)] transition-colors"
            />
            <button
              onClick={send}
              disabled={loading || !input.trim()}
              className="w-12 h-12 rounded-full flex items-center justify-center bounce shrink-0 disabled:opacity-30"
              style={{ background: 'linear-gradient(135deg, var(--purple), var(--cyan))', boxShadow: '0 0 20px rgba(112,0,255,0.4)' }}
            >
              <Send size={16} />
            </button>
          </div>
        </div>
      );
    };

    // ════════════════════════════════════════════════════════════════════════════
    // ROOT APP
    // ════════════════════════════════════════════════════════════════════════════
    function App() {
      const [tab, setTab] = useState('home');
      const [games, setGames] = useState({ trending: [], upcoming: [], top: [] });
      const [loading, setLoading] = useState(true);
      const [vault, setVault] = useState([]);
      const [connectedAccounts, setConnectedAccounts] = useState({ steam: false, epic: false });
      const [syncingPlatform, setSyncingPlatform] = useState(null);
      const [activeGame, setActiveGame] = useState(null);
      const [gameMode, setGameMode] = useState(null);
      const [showImport, setShowImport] = useState(false);
      const [showAI, setShowAI] = useState(false);
      const [bootDone, setBootDone] = useState(false);

      useEffect(() => {
        const fetchAll = async () => {
          try {
            const [t, u, top] = await Promise.all([
              fetch(`${RAWG}/games?key=${RAWG_KEY}&ordering=-added&page_size=15`).then(r => r.json()),
              fetch(`${RAWG}/games?key=${RAWG_KEY}&dates=2024-01-01,2026-12-31&ordering=-added&page_size=15`).then(r => r.json()),
              fetch(`${RAWG}/games?key=${RAWG_KEY}&ordering=-rating&page_size=20&metacritic=80,100`).then(r => r.json()),
            ]);
            setGames({ trending: t.results || [], upcoming: u.results || [], top: top.results || [] });
            setVault((t.results || []).slice(0, 3));
          } catch (e) { console.error(e); }
          setTimeout(() => setBootDone(true), 200);
          setLoading(false);
        };
        fetchAll();
      }, []);

      const openGame = (game, mode) => { vib(40); setActiveGame(game); setGameMode(mode); };
      const closeGame = () => { setActiveGame(null); setGameMode(null); };

      const addToVault = (game) => {
        vib(30);
        setVault(prev => prev.find(g => g.id === game.id) ? prev : [{ ...game, source: 'manual' }, ...prev]);
      };

      const removeFromVault = (id) => {
        vib(40);
        setVault(prev => prev.filter(g => g.id !== id));
      };

      const handleImport = (text) => {
        const newGames = text.split('\n').filter(l => l.trim()).map((line, i) => ({
          id: `custom-${Date.now()}-${i}`,
          name: line.trim(),
          background_image: null,
          rating: 0,
          source: 'manual'
        }));
        setVault(prev => [...prev, ...newGames]);
        setShowImport(false);
        setTab('vault');
      };

      const handleConnect = (platform) => {
        vib(40);
        if (connectedAccounts[platform]) {
          setConnectedAccounts(p => ({ ...p, [platform]: false }));
          setVault(prev => prev.filter(g => g.source !== platform));
          return;
        }
        setSyncingPlatform(platform);
        setTimeout(() => {
          const injected = platform === 'steam' ? [
            { id: 'stm1', name: 'Cyberpunk 2077', background_image: 'https://images.unsplash.com/photo-1605901309584-818e25960b8f?w=800', rating: 4.2, source: 'steam' },
            { id: 'stm2', name: 'Elden Ring', background_image: 'https://images.unsplash.com/photo-1623934199716-ba2e204b3bf5?w=800', rating: 4.9, source: 'steam' },
            { id: 'stm3', name: 'Baldur\'s Gate 3', background_image: 'https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=800', rating: 4.8, source: 'steam' },
          ] : [
            { id: 'epc1', name: 'Fortnite', background_image: 'https://images.unsplash.com/photo-1580234811432-5202e455026e?w=800', rating: 3.8, source: 'epic' },
            { id: 'epc2', name: 'Alan Wake 2', background_image: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800', rating: 4.5, source: 'epic' },
          ];
          setVault(prev => [...injected.filter(g => !prev.find(p => p.id === g.id)), ...prev]);
          setConnectedAccounts(p => ({ ...p, [platform]: true }));
          setSyncingPlatform(null);
        }, 2000);
      };

      const NAV = [
        { id: 'home', icon: Home, label: 'Nexus' },
        { id: 'explore', icon: Compass, label: 'Explore' },
        { id: 'search', icon: Search, label: 'Search' },
        { id: 'rankings', icon: TrendingUp, label: 'Ranks' },
        { id: 'vault', icon: Library, label: 'Vault' },
        { id: 'profile', icon: User, label: 'ID' },
      ];

      const isModal = activeGame || showImport || showAI;

      return (
        <div className="min-h-screen relative overflow-x-hidden">
          <PhysicsStyles />

          <div className="orb w-[70vw] h-[70vw] bg-[var(--purple)]" style={{ top: '-15%', left: '-10%' }} />
          <div className="orb w-[55vw] h-[55vw] bg-[var(--cyan)]" style={{ bottom: '-10%', right: '-10%', animationDelay: '-9s' }} />
          <div className="orb w-[40vw] h-[40vw] bg-[var(--pink)]" style={{ top: '35%', left: '15%', animationDelay: '-5s' }} />

          {!bootDone ? (
            <div className="fixed inset-0 z-[100] bg-[#050505] flex flex-col items-center justify-center gap-6">
              <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-[var(--purple)] to-[var(--cyan)] flex items-center justify-center float">
                <Gamepad2 size={32} />
              </div>
              <div className="text-center">
                <h1 className="text-2xl font-black text-white font-orb">OmniNexus</h1>
                <p className="text-white/40 text-xs mt-1 tracking-widest uppercase">Ultimate Gaming OS</p>
              </div>
              <div className="w-48 h-1 bg-white/10 rounded-full overflow-hidden">
                <div className="h-full bg-gradient-to-r from-[var(--purple)] to-[var(--cyan)] rounded-full" style={{ animation: 'shimmer 1s linear infinite', backgroundSize: '200% auto' }} />
              </div>
              <p className="text-[var(--cyan)] font-orb text-xs animate-pulse tracking-widest">INITIALIZING...</p>
            </div>
          ) : (
            <>
              {tab === 'home' && <HomeView games={games} loading={loading} onGameClick={openGame} />}
              {tab === 'explore' && <ExploreView onGameClick={openGame} />}
              {tab === 'search' && <SearchView onGameClick={openGame} />}
              {tab === 'rankings' && <RankingsView games={games} loading={loading} onGameClick={openGame} />}
              {tab === 'vault' && <VaultView vault={vault} onGameClick={openGame} onShowImport={() => setShowImport(true)} onRemove={removeFromVault} />}
              {tab === 'profile' && <ProfileView connectedAccounts={connectedAccounts} syncingPlatform={syncingPlatform} onConnect={handleConnect} vault={vault} />}

              {activeGame && gameMode === 'detail' && (
                <GameDetailModal
                  game={activeGame}
                  onClose={closeGame}
                  onStream={(g) => { setGameMode('stream'); }}
                  onAddVault={addToVault}
                  inVault={vault.some(g => g.id === activeGame.id)}
                />
              )}
              {activeGame && gameMode === 'stream' && <StreamModal game={activeGame} onClose={closeGame} />}
              {showImport && <BulkImportModal onImport={handleImport} onClose={() => setShowImport(false)} />}
              {showAI && <AIAssistantModal onClose={() => setShowAI(false)} />}

              {!isModal && (
                <button
                  onClick={() => { vib(50); setShowAI(true); }}
                  className="fixed bottom-28 right-5 z-40 w-14 h-14 rounded-full flex items-center justify-center bounce"
                  style={{ background: 'linear-gradient(135deg, var(--purple), var(--cyan))', boxShadow: '0 0 25px rgba(112,0,255,0.5)' }}
                >
                  <Bot size={22} />
                </button>
              )}

              {!isModal && (
                <nav className="fixed bottom-4 left-1/2 -translate-x-1/2 glass px-2 py-2 rounded-[2rem] flex z-40 w-[96%] max-w-md justify-between border border-white/10 shadow-[0_20px_60px_rgba(0,0,0,0.9)]">
                  {NAV.map(item => {
                    const Icon = item.icon;
                    const active = tab === item.id;
                    return (
                      <button
                        key={item.id}
                        onClick={() => { vib(20); setTab(item.id); }}
                        className={`relative flex flex-col items-center justify-center gap-0.5 px-3 py-2 rounded-2xl transition-all bounce ${active ? 'text-black' : 'text-white/40'}`}
                        style={active ? { background: 'linear-gradient(135deg, var(--cyan), var(--purple))', boxShadow: '0 0 15px rgba(0,240,255,0.3)' } : {}}
                      >
                        <Icon size={18} strokeWidth={active ? 2.5 : 1.8} />
                        <span className="text-[9px] font-bold">{item.label}</span>
                      </button>
                    );
                  })}
                </nav>
              )}
            </>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
