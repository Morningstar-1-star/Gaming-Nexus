<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#090310">
  <title>NexusCore · Tactical Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root {
  --bg:         #090310;
  --surface:    #160a26;
  --surface-hl: #251240;
  --border:     rgba(255,255,255,0.07);
  --text:       #ffffff;
  --muted:      rgba(255,255,255,0.5);
  --neon-y:     #D4FF00;
  --neon-p:     #8A2BE2;
  --spring:     cubic-bezier(0.175, 0.885, 0.32, 1.275);
  --rubber:     cubic-bezier(0.34, 1.56, 0.64, 1);
  --nav-h:      76px;
}

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
html { height: 100%; }
body { background: var(--bg); color: var(--text); overscroll-behavior: none; height: 100%; width: 100%; overflow: hidden; }
#app { height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; }

/* ---- Scrollable views ---- */
.view-wrap { height: 100%; overflow-y: auto; overflow-x: hidden; padding-bottom: calc(var(--nav-h) + 20px); -webkit-overflow-scrolling: touch; }

/* ---- Scrollbar hide ---- */
.hide-scroll { scrollbar-width: none; -ms-overflow-style: none; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.hide-scroll::-webkit-scrollbar { display: none; }
.view-wrap::-webkit-scrollbar { display: none; }

/* ---- Clamp ---- */
.lc1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.lc2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* ---- Animations ---- */
@keyframes stretchY { 0% { transform: scaleY(0.94) translateY(16px); opacity: 0; } 100% { transform: scaleY(1) translateY(0); opacity: 1; } }
@keyframes popIn    { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
@keyframes fadeUp   { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
@keyframes shimmer  { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
@keyframes pulseGlow{ from { box-shadow: 0 0 10px rgba(212,255,0,0.25); } to { box-shadow: 0 0 28px rgba(212,255,0,0.7); } }
@keyframes spin     { to { transform: rotate(360deg); } }
@keyframes blink    { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.anim-stretch { animation: stretchY 0.45s var(--spring) forwards; }
.anim-pop     { animation: popIn 0.4s var(--spring) forwards; }
.anim-fadeup  { animation: fadeUp 0.4s var(--spring) forwards; }

/* ---- Tap effect ---- */
.tap { transition: transform 0.18s var(--spring); cursor: pointer; }
.tap:active { transform: scale(0.91); }

/* ---- Pulse ---- */
.pulse { animation: pulseGlow 2s ease-in-out infinite alternate; }

/* ---- Skeleton ---- */
.skel { background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hl) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.6s infinite; border-radius: 12px; }

/* ---- Buttons ---- */
.btn-neon    { background: var(--neon-y); color: #000; font-weight: 800; border: none; border-radius: 99px; padding: 15px 24px; font-size: 15px; display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; }
.btn-ghost   { background: rgba(255,255,255,0.08); color: var(--text); font-weight: 700; border: 1px solid var(--border); border-radius: 99px; padding: 12px 20px; font-size: 14px; display: flex; justify-content: center; align-items: center; gap: 6px; cursor: pointer; }
.icon-btn    { width: 44px; height: 44px; border-radius: 14px; background: rgba(255,255,255,0.07); border: 1px solid var(--border); display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; }
.pill        { background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-radius: 99px; padding: 9px 18px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; }
.pill.active { background: var(--neon-y); color: #000; border-color: var(--neon-y); }

/* ---- Input ---- */
.inp { background: var(--surface-hl); border: 1.5px solid var(--border); border-radius: 16px; padding: 14px 18px; color: var(--text); font-size: 15px; outline: none; width: 100%; transition: border-color 0.2s; }
.inp:focus { border-color: var(--neon-p); box-shadow: 0 0 0 3px rgba(138,43,226,0.18); }
.inp::placeholder { color: var(--muted); }

/* ---- Cards ---- */
.card-v { display: inline-flex; flex-direction: column; width: 140px; margin-right: 14px; scroll-snap-align: start; flex-shrink: 0; }
.card-img { width: 100%; aspect-ratio: 3/4; border-radius: 20px; overflow: hidden; background: var(--surface); position: relative; box-shadow: 0 12px 32px rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.06); }
.card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.badge-hot { position: absolute; top: 10px; right: 10px; background: var(--neon-y); color: #000; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 8px; letter-spacing: 0.5px; text-transform: uppercase; }

/* ---- Nav ---- */
.nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: rgba(9,3,16,0.9); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding: 0 8px 12px; z-index: 50; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--muted); background: none; border: none; font-size: 10px; font-weight: 700; min-width: 56px; padding: 6px; cursor: pointer; transition: color 0.2s; }
.nav-btn.active { color: var(--neon-y); }
.nav-icon { width: 42px; height: 30px; display: flex; justify-content: center; align-items: center; border-radius: 12px; transition: background 0.2s; }
.nav-btn.active .nav-icon { background: rgba(212,255,0,0.12); }

/* ---- Header ---- */
.hdr { padding: 52px 20px 16px; display: flex; justify-content: space-between; align-items: flex-start; }

/* ---- Stream ---- */
.stream-wrap { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; overflow: hidden; }
.stream-player { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; flex-shrink: 0; }
.stream-player iframe { width: 100%; height: 100%; border: none; display: block; }
.stream-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%); border-radius: 24px 24px 0 0; margin-top: -20px; z-index: 2; position: relative; }
.stream-chat-list { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
.stream-chat-list::-webkit-scrollbar { display: none; }

/* ---- Redesigned stream UI (KEMU style) ---- */
.s2-hdr { position: absolute; top: 0; left: 0; right: 0; padding: 52px 20px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 3; }
.s2-hdr-title { font-size: 13px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: white; }
.s2-badge { position: absolute; top: 18px; left: 16px; z-index: 2; display: flex; align-items: center; gap: 6px; }
.s2-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4444; animation: blink 1.2s infinite; }
.s2-views { color: white; font-size: 12px; font-weight: 700; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
.s2-rec { position: absolute; top: 16px; right: 16px; z-index: 2; background: rgba(255,255,255,0.92); color: #000; font-size: 11px; font-weight: 800; padding: 6px 14px; border-radius: 99px; }
.s2-expand { position: absolute; bottom: 56px; right: 14px; z-index: 2; color: white; }
.s2-progress { position: absolute; bottom: 0; left: 0; right: 0; height: 38px; background: rgba(0,0,0,0.55); display: flex; align-items: center; z-index: 2; }
.s2-progress-bar { position: relative; flex: 1; height: 4px; background: rgba(255,255,255,0.25); margin: 0 12px; border-radius: 4px; overflow: hidden; }
.s2-progress-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--neon-y); border-radius: 4px; }
.s2-time { font-size: 11px; font-weight: 700; color: white; padding: 0 6px; flex-shrink: 0; }
.s2-controls { padding: 18px 20px 8px; }
.s2-controls-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.s2-controls-btn { width: 52px; height: 52px; border-radius: 50%; background: var(--neon-y); display: flex; align-items: center; justify-content: center; color: #000; cursor: pointer; flex-shrink: 0; }
.s2-controls-side { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; color: var(--muted); cursor: pointer; flex-shrink: 0; }
.s2-feedback { display: flex; gap: 12px; padding: 16px 20px 4px; }
.s2-feedback .icon-btn { width: 40px; height: 40px; border-radius: 14px; }
.s2-donate-row { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-top: 1px solid var(--border); margin-top: 4px; }
.s2-donate-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--surface-hl); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; flex-shrink: 0; }
.s2-donate-time { font-size: 11px; color: var(--muted); margin-left: auto; flex-shrink: 0; }
.s2-input-row { display: flex; gap: 10px; align-items: center; padding: 12px 16px 28px; border-top: 1px solid var(--border); }

/* ---- AI Chat ---- */
.chat-wrap { position: fixed; inset: 0; background: radial-gradient(circle at 30% 0%, #2b134d 0%, var(--bg) 55%); z-index: 80; display: flex; flex-direction: column; overflow: hidden; }
.chat-hdr { padding: 52px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.25); backdrop-filter: blur(12px); flex-shrink: 0; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; -webkit-overflow-scrolling: touch; }
.chat-msgs::-webkit-scrollbar { display: none; }
.chat-inp { padding: 14px 16px 30px; background: rgba(0,0,0,0.45); backdrop-filter: blur(20px); flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.05); }
.msg { max-width: 86%; padding: 13px 17px; border-radius: 20px; font-size: 14px; line-height: 1.55; font-weight: 500; word-break: break-word; }
.msg-ai   { background: var(--surface-hl); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 5px; align-self: flex-start; }
.msg-user { background: var(--neon-p); color: white; border-bottom-right-radius: 5px; align-self: flex-end; box-shadow: 0 8px 24px rgba(138,43,226,0.3); }
.msg-think { opacity: 0.6; }
.msg-think span { animation: blink 1.2s ease-in-out infinite; display: inline-block; }

/* ---- Detail ---- */
.detail-wrap { position: fixed; inset: 0; overflow-y: auto; background: var(--bg); z-index: 70; -webkit-overflow-scrolling: touch; }
.detail-wrap::-webkit-scrollbar { display: none; }
.detail-hero { height: 62vh; position: relative; flex-shrink: 0; }
.detail-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
.detail-grad { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(9,3,16,0.15) 0%, rgba(9,3,16,0.7) 60%, var(--bg) 100%); }
.detail-nav  { position: absolute; top: 44px; left: 20px; right: 20px; display: flex; justify-content: space-between; }
.detail-info { position: absolute; bottom: 0; left: 20px; right: 20px; padding-bottom: 24px; }
.detail-body { padding: 20px; }

/* ---- Settings ---- */
.settings-wrap { position: fixed; inset: 0; overflow-y: auto; background: var(--bg); z-index: 90; padding: 52px 20px 40px; -webkit-overflow-scrolling: touch; }
.settings-wrap::-webkit-scrollbar { display: none; }

/* ---- Loading spinner ---- */
.spinner { width: 22px; height: 22px; border: 2.5px solid rgba(212,255,0,0.2); border-top-color: var(--neon-y); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }

/* ---- FAB ---- */
.fab { position: fixed; bottom: calc(var(--nav-h) + 16px); right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--neon-p); display: flex; justify-content: center; align-items: center; z-index: 60; cursor: pointer; box-shadow: 0 6px 24px rgba(138,43,226,0.45); }

/* ---- Game card suggestion in chat ---- */
.game-suggest { margin-top: 10px; background: rgba(0,0,0,0.45); border-radius: 12px; padding: 10px 12px; display: flex; gap: 10px; align-items: center; cursor: pointer; border: 1px solid var(--border); }
.game-suggest img { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }

/* ---- Result card (image-led suggestion) ---- */
.result-card { margin-top: 10px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.result-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: var(--surface); }
.result-card-body { padding: 12px 14px; }
.result-card-title { font-size: 14px; font-weight: 800; margin-bottom: 10px; }
.result-card-btn { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid var(--border); color: var(--text); font-weight: 700; font-size: 13px; border-radius: 12px; padding: 11px; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; }
.result-card-btn:active { transform: scale(0.97); }

/* ---- Feedback (thumbs) ---- */
.feedback-row { display: flex; gap: 10px; margin-top: 8px; align-self: flex-start; }
.feedback-row .icon-btn { width: 32px; height: 32px; border-radius: 10px; }

/* ---- Quick reply chips ---- */
.qr-row { display: flex; gap: 8px; padding: 2px 16px 4px; flex-shrink: 0; }
.qr-chip { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 12px; font-weight: 600; padding: 9px 14px; border-radius: 99px; white-space: nowrap; display: flex; align-items: center; gap: 6px; cursor: pointer; }
.qr-chip:active { transform: scale(0.95); }

/* ---- Image attach preview ---- */
.attach-preview { padding: 0 16px 10px; }
.attach-preview-thumb { position: relative; width: 64px; height: 64px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
.attach-preview-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.attach-preview-remove { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; border-radius: 50%; background: #ff4d4d; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--bg); }

/* ---- Profile ---- */
.profile-wrap { padding: 52px 20px 0; display: flex; flex-direction: column; align-items: center; }
.avatar-big { width: 90px; height: 90px; border-radius: 28px; background: var(--surface-hl); border: 2px solid var(--neon-p); display: flex; justify-content: center; align-items: center; font-size: 36px; margin-bottom: 16px; overflow: hidden; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; text-align: center; flex: 1; }
</style>
</head>

<script>

// API
// =========================================================================
const fetchRAWG = async (endpoint) => {
  try {
    const sep = endpoint.includes('?') ? '&' : '?';
    const res = await fetch(`https://api.rawg.io/api/${endpoint}${sep}key=${RAWG_KEY}`);
    if (!res.ok) throw new Error('RAWG ' + res.status);
    const data = await res.json();
    return data.results || [];
  } catch (e) { console.warn('RAWG:', e); return []; }
};

const loadData = async () => {
  const today = new Date().toISOString().split('T')[0];
  const ago90 = new Date(Date.now() - 90*864e5).toISOString().split('T')[0];
  try {
    const [top, newG, action] = await Promise.all([
      fetchRAWG('games?ordering=-added&page_size=12'),
      fetchRAWG(`games?dates=${ago90},${today}&ordering=-rating&page_size=12`),
      fetchRAWG('games?genres=action&ordering=-added&page_size=12'),
    ]);
    state.games.top = top.filter(g => g.background_image);
    state.games.newGames = newG.filter(g => g.background_image);
    state.games.action = action.filter(g => g.background_image);
  } catch(e) { console.warn('loadData:', e); }
  state.loading = false;
  state.vault = getVault();
  render();
};

const fetchGameDetail = async (id) => {
  try {
    const res = await fetch(`https://api.rawg.io/api/games/${id}?key=${RAWG_KEY}`);
    return await res.json();
  } catch { return null; }
};

const askAI = async (userMsg) => {
  const key = getSettings().openrouter_key;
  if (!key) return "⚠️ No API key found. Go to Settings and paste your OpenRouter key to activate AI.";
  const msgs = [
    { role: 'system', content: 'You are Nexus, an expert gaming AI. Give sharp, useful advice on game strategy, lore, loadouts, and mechanics. Keep answers concise but insightful. Use gaming terminology naturally.' },
    ...state.chatHistory
      .filter(m => m.role === 'user' || m.role === 'assistant')
      .slice(-10)
      .map(m => ({ role: m.role, content: m.content })),
    { role: 'user', content: userMsg }
  ];
  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json', 'HTTP-Referer': 'https://nexuscore.app', 'X-Title': 'NexusCore' },
      body: JSON.stringify({ model: 'google/gemini-2.5-flash', messages: msgs, max_tokens: 600 })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      return `❌ API Error ${res.status}: ${err.error?.message || 'Check your key in Settings.'}`;
    }
    const data = await res.json();
    return data.choices?.[0]?.message?.content || 'No response. Try again.';
  } catch (e) {
    return '❌ Network error. Check your connection.';
  }
};

// =========================================================================
// DOM HELPERS
// =========================================================================
const h = (tag, props = {}, ...children) => {
  const el = document.createElement(tag);
  for (const k in props) {
    if (k.startsWith('on') && typeof props[k] === 'function') {
      el.addEventListener(k.slice(2).toLowerCase(), props[k]);
    } else if (k === 'style' && typeof props[k] === 'object') {
      Object.assign(el.style, props[k]);
    } else if (k === 'cls') {
      el.className = props[k];
    } else if (props[k] != null && props[k] !== false) {
      el.setAttribute(k, props[k]);
    }
  }
  const flat = children.flat(Infinity);
  flat.forEach(c => {
    if (c == null || c === false) return;
    el.append(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
  });
  return el;
};

const div  = (cls, ...kids) => h('div', { cls }, ...kids);
const span = (cls, txt) => h('span', { cls }, txt);
const p    = (cls, txt) => h('p', { cls }, txt);

// RENDER
// =========================================================================
const render = () => {
  const root = document.getElementById('app');
  root.innerHTML = '';
  if (state.view === 'detail')   { root.append(ViewDetail()); return; }
  if (state.view === 'stream')   { root.append(ViewStream()); return; }
  if (state.view === 'chat')     { root.append(ViewChat());   return; }
  if (state.view === 'settings') { root.append(ViewSettings()); return; }

  // Main tabs
  let content;
  if (state.tab === 'home')    content = ViewHome();
  else if (state.tab === 'search') content = ViewSearch();
  else if (state.tab === 'vault')  content = ViewVault();
  else                          content = ViewProfile();
  root.append(content);
  root.append(NavBar());
  // FAB
  const fab = h('div', { cls: 'fab tap pulse', onClick: () => { state.view = 'chat'; render(); } }, svg('bot', 26, { color: 'white' }));
  root.append(fab);
};

        pill.addEventListener('click', () => { state.activeCategory = c; render(); });
        return pill;
      })
    )
  ));

  // Row renderer
  const mkRow = (title, games, hot = false) => {
    const row = h('div', { style: { marginBottom: '28px' } });
    row.append(h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', padding: '0 20px', marginBottom: '14px' } },
      h('h3', { style: { fontSize: '18px', fontWeight: '800' } }, title),
      h('span', { style: { color: 'var(--neon-y)', fontSize: '13px', fontWeight: '700', cursor: 'pointer' } }, 'View All')
    ));
    const scroll = h('div', { cls: 'hide-scroll', style: { display: 'flex', paddingLeft: '20px', scrollSnapType: 'x mandatory' } });
    if (state.loading) {
      for (let i = 0; i < 4; i++) {
        scroll.append(h('div', { cls: 'card-v' },
          h('div', { cls: 'card-img skel' }),
          h('div', { cls: 'skel', style: { height: '13px', marginTop: '10px', width: '75%' } }),
          h('div', { cls: 'skel', style: { height: '11px', marginTop: '6px', width: '50%' } })

      games.slice(0, 10).forEach((g, idx) => {
        const card = h('div', { cls: 'card-v tap', style: { animationDelay: `${idx * 0.05}s` } });
        card.addEventListener('click', () => openDetail(g));
        const imgW = div('card-img',
          h('img', { src: g.background_image, loading: 'lazy', alt: g.name })
        );
        if (hot) imgW.append(h('div', { cls: 'badge-hot' }, 'HOT'));
        card.append(imgW);
        card.append(h('h4', { cls: 'lc1', style: { fontSize: '13px', fontWeight: '700', marginTop: '10px' } }, g.name));
        card.append(h('p', { cls: 'lc1', style: { fontSize: '11px', color: 'var(--muted)', marginTop: '3px' } }, g.genres?.[0]?.name || 'Unknown'));
        scroll.append(card);
      });
    }
    row.append(scroll);
    return row;
  };

  wrap.append(mkRow('Top games', state.games.top));
  wrap.append(mkRow('New ops', state.games.newGames, true));
  return wrap;
};

const openDetail = async (g) => {
  state.activeGame = g;
  state.view = 'detail';
  render();
  // Fetch full detail in background
  const full = await fetchGameDetail(g.id);
  if (full && state.view === 'detail' && state.activeGame?.id === g.id) {
    state.activeGame = { ...g, ...full };
    render();
  }
};

const ViewDetail = () => {
  const g = state.activeGame;
  if (!g) { state.view = null; render(); return div(''); }

  const isSaved = getVault().some(v => v.id === g.id);
  const wrap = div('detail-wrap anim-pop');

  // Hero
  const hero = div('detail-hero');
  hero.append(h('img', { src: g.background_image, alt: g.name }));
  hero.append(div('detail-grad'));
  
  // Nav
  hero.append(h('div', { cls: 'detail-nav' },
    h('button', { cls: 'icon-btn tap', style: { background: 'rgba(0,0,0,0.55)', backdropFilter: 'blur(12px)' }, onClick: () => { state.view = null; render(); } }, svg('back', 20)),
    h('div', { style: { display: 'flex', gap: '10px' } },
      h('button', { cls: 'icon-btn tap', style: { background: 'rgba(0,0,0,0.55)', backdropFilter: 'blur(12px)', color: isSaved ? 'var(--neon-y)' : 'white' }, onClick: () => {
        let vault = getVault();
        if (isSaved) vault = vault.filter(v => v.id !== g.id);
        else vault.unshift({ id: g.id, name: g.name, background_image: g.background_image, genres: g.genres, rating: g.rating });
        saveVault(vault);
        state.vault = vault;
        render();
      }}, svg('heart', 20, { fill: isSaved ? 'var(--neon-y)' : 'none', stroke: isSaved ? 'var(--neon-y)' : 'white' }))
    )
  ));

  // Info overlay
  const info = div('detail-info');
  info.append(h('h1', { cls: 'lc2', style: { fontSize: '34px', fontWeight: '800', lineHeight: '1.1', marginBottom: '8px' } }, g.name));
  info.append(h('div', { style: { display: 'flex', gap: '12px', alignItems: 'center' } },
    g.released ? h('span', { style: { color: 'var(--muted)', fontSize: '13px' } }, g.released.slice(0, 4)) : null,
    g.rating ? h('span', { style: { color: 'var(--neon-y)', fontSize: '13px', fontWeight: '800', display: 'flex', alignItems: 'center', gap: '4px' } }, svg('star', 13), String(g.rating)) : null,
    ...(g.genres || []).slice(0, 2).map(gn => h('span', { style: { background: 'rgba(255,255,255,0.12)', padding: '3px 10px', borderRadius: '99px', fontSize: '11px', fontWeight: '600' } }, gn.name))
  ));
  hero.append(info);
  wrap.append(hero);

  // Body
  const body = div('detail-body');

  // CTA buttons
  body.append(h('div', { style: { display: 'flex', gap: '12px', marginBottom: '28px' } },
    h('button', { cls: 'btn-neon tap pulse', style: { flex: 1 }, onClick: () => { state.view = 'stream'; render(); } },
      svg('play', 18), 'Watch Live'),
    h('button', { cls: 'btn-ghost tap', style: { flexShrink: 0 }, onClick: () => { state.view = 'chat'; render(); } },
      svg('bot', 18), 'Ask AI')
  ));

  // About
  const desc = g.description_raw || g.description || '';
  const cleanDesc = desc.replace(/<[^>]+>/g, '').trim() || `Get ready to deploy into ${g.name}. Intense tactical gameplay across massive environments.`;
  body.append(h('h3', { style: { fontSize: '18px', fontWeight: '800', marginBottom: '10px' } }, 'About'));
  body.append(h('p', { style: { fontSize: '14px', lineHeight: '1.65', color: 'rgba(255,255,255,0.72)', marginBottom: '28px' } }, cleanDesc.slice(0, 320) + (cleanDesc.length > 320 ? '...' : '')));

  // Screenshots
  if (g.short_screenshots?.length) {
    body.append(h('h3', { style: { fontSize: '18px', fontWeight: '800', marginBottom: '12px' } }, 'Screenshots'));
    const gallery = h('div', { cls: 'hide-scroll', style: { display: 'flex', gap: '12px', paddingBottom: '4px' } });
    g.short_screenshots.forEach(s => {
      gallery.append(h('img', { src: s.image, loading: 'lazy', alt: '', style: { height: '130px', borderRadius: '14px', objectFit: 'cover', flexShrink: 0 } }));
    });
    body.append(gallery);

  // Platforms
  if (g.platforms?.length) {
    body.append(h('div', { style: { marginTop: '28px' } },
      h('h3', { style: { fontSize: '18px', fontWeight: '800', marginBottom: '10px' } }, 'Platforms'),
      h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '8px' } },
        ...g.platforms.slice(0, 6).map(p => h('span', { style: { background: 'var(--surface-hl)', border: '1px solid var(--border)', borderRadius: '8px', padding: '6px 12px', fontSize: '12px', fontWeight: '600' } }, p.platform.name))
      )
    ));
  }

  body.append(h('div', { style: { height: '40px' } })); // bottom spacer
  wrap.append(body);
  return wrap;
};

const ViewChat = () => {
  const wrap = div('chat-wrap anim-pop');

  // Header
  wrap.append(h('div', { cls: 'chat-hdr' },
    h('button', { cls: 'tap', style: { color: 'white', background: 'none', border: 'none', padding: '4px', cursor: 'pointer' }, onClick: () => { state.view = null; render(); } }, svg('x', 24)),
    h('div', { style: { textAlign: 'center' } },
      h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '7px', marginBottom: '2px' } },
        svg('bot', 20, { color: 'var(--neon-y)' }),
        h('h3', { style: { fontSize: '16px', fontWeight: '800' } }, 'Tactical Analyst')
      ),
      h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '5px' } },
        h('div', { style: { width: '6px', height: '6px', borderRadius: '50%', background: '#4caf50', animation: 'blink 2s infinite' } }),
        h('span', { style: { fontSize: '11px', color: '#4caf50', fontWeight: '600' } }, 'Online')
      )
    ),
    h('button', { cls: 'tap', style: { color: 'white', background: 'none', border: 'none', padding: '4px', cursor: 'pointer' }, onClick: () => { state.view = 'settings'; render(); } }, svg('settings', 22))
  ));

  // Messages
  const msgList = div('chat-msgs');
  msgList.id = 'chat-msg-list';

  state.chatHistory.forEach((m, idx) => {
    const isAI = m.role === 'assistant';
    const thinking = m.thinking;

    const bub = h('div', { cls: `msg ${isAI ? 'msg-ai' : 'msg-user'}${thinking ? ' msg-think' : ''}`,
      style: { animation: `fadeUp 0.3s ${Math.min(idx * 0.04, 0.4)}s both` }
    });

    if (thinking) {
      bub.append(svg('bot', 16, { color: 'var(--neon-y)', style: { marginRight: '6px' } }));
      bub.append(h('span', {}, '●'), h('span', { style: { animationDelay: '0.2s' } }, '●'), h('span', { style: { animationDelay: '0.4s' } }, '●'));
    } else {
      bub.textContent = m.content;
    }

    // Game card suggestion if AI mentions game context
    if (isAI && !thinking && state.activeGame && m.content.toLowerCase().includes(state.activeGame.name.toLowerCase().split(':')[0])) {
      const g = state.activeGame;
      const card = h('div', { cls: 'result-card tap', onClick: () => { state.view = 'detail'; render(); } });
      if (g.background_image) card.append(h('img', { src: g.background_image, alt: g.name }));
      card.append(h('div', { cls: 'result-card-body' },
        h('p', { cls: 'result-card-title' }, g.name),
        h('button', { cls: 'result-card-btn tap' }, svg('play', 16), 'View This Game')
      ));
      bub.append(card);
    }

    msgList.append(bub);

    // Feedback thumbs under completed AI replies
    if (isAI && !thinking && idx > 0) {
      const fb = h('div', { cls: 'feedback-row' },
        h('div', { cls: 'icon-btn tap' }, svg('thumbsUp', 15)),
        h('div', { cls: 'icon-btn tap' }, svg('thumbsDown', 15)),
      );
      msgList.append(fb);
    }
  });

  wrap.append(msgList);
  setTimeout(() => { msgList.scrollTop = msgList.scrollHeight; }, 50);

  // Quick reply chips
  const chips = ['🧐 I don\'t understand', '🙏 Thank you!', '🤔 I need more tips', '⚔️ Best loadout?'];
  const chipsRow = h('div', { cls: 'hide-scroll qr-row' });
  chips.forEach(chip => {
    const btn = h('button', { cls: 'qr-chip tap' }, chip);
    btn.addEventListener('click', () => {
      const ctx = state.activeGame ? ` (about ${state.activeGame.name})` : '';
      sendChat(chip.replace(/^\S+\s/, '') + ctx);
    });
    chipsRow.append(btn);
  });
  wrap.append(chipsRow);

  // Input area
  const inpArea = div('chat-inp');

  // Attached image preview
  if (state.attachedImage) {
    const preview = div('attach-preview');
    const thumb = h('div', { cls: 'attach-preview-thumb' },
      h('img', { src: state.attachedImage }),
      h('div', { cls: 'attach-preview-remove tap' }, svg('x', 13, { color: 'white', 'stroke-width': '3' }))
    );
    thumb.querySelector('.attach-preview-remove').addEventListener('click', () => { state.attachedImage = null; render(); });
    preview.append(thumb);
    inpArea.append(preview);
  }

  const inpRow = h('div', { style: { display: 'flex', gap: '10px', alignItems: 'center' } });
  const input = h('input', { cls: 'inp', placeholder: 'Ask about strategy, lore, loadouts...', style: { flex: 1, borderRadius: '24px' } });

  const fileInput = h('input', { type: 'file', accept: 'image/*', style: { display: 'none' } });
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { state.attachedImage = reader.result; render(); setTimeout(() => { const i = document.querySelector('.chat-inp .inp'); if (i) i.focus(); }, 50); };
    reader.readAsDataURL(file);
  });
  const attachBtn = h('button', { cls: 'icon-btn tap', style: { width: '48px', height: '48px', borderRadius: '24px', flexShrink: 0 } }, svg('clip', 20));
  attachBtn.addEventListener('click', () => fileInput.click());

  const sendBtn = h('button', { cls: 'tap', style: { background: state.chatLoading ? 'var(--surface-hl)' : 'var(--neon-y)', border: 'none', width: '48px', height: '48px', borderRadius: '24px', display: 'flex', justifyContent: 'center', alignItems: 'center', flexShrink: 0, cursor: 'pointer', transition: 'background 0.2s' } },
    state.chatLoading ? h('div', { cls: 'spinner' }) : svg('send', 20, { color: '#000' })
  );

  const sendChat = async (txt) => {
    const val = txt || input.value.trim();
    if (!val || state.chatLoading) return;
    input.value = '';
    state.attachedImage = null;
    state.chatLoading = true;
    state.chatHistory.push({ role: 'user', content: val });
    state.chatHistory.push({ role: 'assistant', content: '', thinking: true });
    render();
    setTimeout(() => { const list = document.getElementById('chat-msg-list'); if (list) list.scrollTop = list.scrollHeight; }, 30);
    const reply = await askAI(val);
    state.chatLoading = false;
    state.chatHistory = state.chatHistory.filter(m => !m.thinking);
    state.chatHistory.push({ role: 'assistant', content: reply });
    render();
    setTimeout(() => { const list = document.getElementById('chat-msg-list'); if (list) list.scrollTop = list.scrollHeight; }, 30);
  };

  sendBtn.addEventListener('click', () => sendChat(null));
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(null); } });
  inpRow.append(attachBtn, fileInput, input, sendBtn);
  inpArea.append(inpRow);
  wrap.append(inpArea);

  setTimeout(() => { input.focus(); }, 200);
  return wrap;
};

// =========================================================================
// SEARCH
// =========================================================================
const ViewSearch = () => {
  const wrap = h('div', { cls: 'view-wrap anim-stretch' });
  wrap.append(h('div', { style: { padding: '52px 20px 16px' } },
    h('h1', { style: { fontSize: '28px', fontWeight: '800', marginBottom: '20px' } }, 'Intel Database'),
    h('input', { cls: 'inp', id: 'search-inp', placeholder: '🔍  Search games...', value: state.searchQuery })
  ));

  const list = h('div', { style: { padding: '0 20px', display: 'flex', flexDirection: 'column', gap: '12px' } });
  list.id = 'search-results';

  const renderResults = (results) => {
    list.innerHTML = '';
    if (state.searchLoading) {
      for (let i = 0; i < 5; i++) {
        list.append(h('div', { style: { display: 'flex', gap: '14px', padding: '12px', background: 'var(--surface-hl)', borderRadius: '16px' } },
          h('div', { cls: 'skel', style: { width: '60px', height: '60px', borderRadius: '10px', flexShrink: 0 } }),
          h('div', { style: { flex: 1 } },
            h('div', { cls: 'skel', style: { height: '14px', width: '70%', marginBottom: '8px' } }),
            h('div', { cls: 'skel', style: { height: '12px', width: '40%' } })
          )
        ));
      }
      return;
    }
    if (!results.length && state.searchQuery.length >= 3) {
      list.append(h('p', { style: { color: 'var(--muted)', textAlign: 'center', padding: '40px 0', fontSize: '15px' } }, 'No results found.'));
      return;
    }
    results.forEach((g, idx) => {
      const row = h('div', { cls: 'tap', style: { display: 'flex', gap: '14px', alignItems: 'center', background: 'var(--surface-hl)', padding: '12px', borderRadius: '16px', border: '1px solid var(--border)', animation: `fadeUp 0.25s ${idx * 0.04}s both`, cursor: 'pointer' } });
      row.addEventListener('click', () => openDetail(g));
      row.append(h('img', { src: g.background_image || '', alt: g.name, style: { width: '60px', height: '60px', borderRadius: '10px', objectFit: 'cover', flexShrink: 0, background: 'var(--surface)' } }));
      row.append(h('div', { style: { flex: 1, minWidth: 0 } },
        h('h4', { cls: 'lc1', style: { fontSize: '15px', fontWeight: '700' } }, g.name),
        h('p', { cls: 'lc1', style: { fontSize: '12px', color: 'var(--muted)', marginTop: '4px' } }, g.genres?.map(x => x.name).join(', ') || 'Unknown'),
        g.rating ? h('div', { style: { display: 'flex', alignItems: 'center', gap: '4px', marginTop: '4px', color: 'var(--neon-y)', fontSize: '12px', fontWeight: '700' } }, svg('star', 12), String(g.rating)) : null
      ));
      row.append(svg('play', 20, { color: 'var(--neon-y)' }));
      list.append(row);
    });
  };

  renderResults(state.searchResults);
  wrap.append(list);

  let debounceTimer;
  setTimeout(() => {
    const inp = document.getElementById('search-inp');
    if (!inp) return;
    inp.addEventListener('input', async (e) => {
      const val = e.target.value.trim();
      state.searchQuery = val;
      clearTimeout(debounceTimer);
      if (val.length < 2) { state.searchResults = []; renderResults([]); return; }
      state.searchLoading = true;
      renderResults([]);
      debounceTimer = setTimeout(async () => {
        const results = await fetchRAWG(`games?search=${encodeURIComponent(val)}&page_size=12`);
        state.searchResults = results;
        state.searchLoading = false;
        renderResults(results);
      }, 350);
    });
    if (state.searchQuery) inp.value = state.searchQuery;
  }, 80);

  return wrap;
};

// =========================================================================
// VAULT
// =========================================================================
const ViewVault = () => {
  const vault = getVault();
  const wrap = h('div', { cls: 'view-wrap anim-stretch' });
  wrap.append(h('div', { style: { padding: '52px 20px 16px' } },
    h('h1', { style: { fontSize: '28px', fontWeight: '800' } }, 'Command Vault')
  ));

  if (!vault.length) {
    wrap.append(h('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '80px 20px', textAlign: 'center' } },
      svg('library', 56, { color: 'rgba(255,255,255,0.1)' }),
      h('h2', { style: { marginTop: '20px', fontSize: '20px', fontWeight: '700' } }, 'Vault is empty'),
      h('p', { style: { color: 'var(--muted)', marginTop: '8px', fontSize: '14px' } }, 'Tap the heart icon on any game to save it here.')
    ));
    return wrap;
  }

  const grid = h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '14px', padding: '0 20px' } });
  vault.forEach((g, idx) => {
    const card = h('div', { cls: 'tap', style: { position: 'relative', borderRadius: '20px', overflow: 'hidden', aspectRatio: '3/4', background: 'var(--surface)', animation: `popIn 0.35s ${idx * 0.05}s both`, cursor: 'pointer' } });
    card.addEventListener('click', () => openDetail(g));
    if (g.background_image) card.append(h('img', { src: g.background_image, alt: g.name, style: { width: '100%', height: '100%', objectFit: 'cover', display: 'block' } }));
    card.append(h('div', { style: { position: 'absolute', inset: 0, background: 'linear-gradient(180deg, transparent 40%, rgba(9,3,16,0.95) 100%)' } }));
    card.append(h('div', { style: { position: 'absolute', bottom: '12px', left: '12px', right: '12px' } },
      h('h4', { cls: 'lc1', style: { fontSize: '13px', fontWeight: '700' } }, g.name),
      g.rating ? h('span', { style: { color: 'var(--neon-y)', fontSize: '11px', fontWeight: '800' } }, `★ ${g.rating}`) : null
    ));
    grid.append(card);
  });
  wrap.append(grid);
  return wrap;
};

        h('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '4px', fontWeight: '600' } }, 'AI KEY')

    h('button', { cls: 'btn-ghost tap', style: { width: '100%' }, onClick: () => { state.chatHistory = [{ role: 'assistant', content: 'Tactical Uplink Established. Ask me about game strategy, lore, loadouts, or anything gaming.' }]; render(); } }, svg('x', 18), 'Clear Chat History')
  ));

const ViewSettings = () => {
  const settings = getSettings();

  wrap.append(h('div', { style: { display: 'flex', gap: '14px', alignItems: 'center', marginBottom: '36px' } },

  ));

  // API Key section
  wrap.append(h('div', { style: { background: 'var(--surface-hl)', padding: '20px', borderRadius: '20px', border: '1px solid var(--border)', marginBottom: '16px' } },
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '8px' } },
      svg('bot', 20, { color: 'var(--neon-y)' }),
      h('h3', { style: { fontSize: '16px', fontWeight: '800', color: 'var(--neon-y)' } }, 'OpenRouter API Key')
    ),
    h('p', { style: { fontSize: '13px', color: 'var(--muted)', marginBottom: '16px', lineHeight: '1.5' } }, 'Required to enable the Tactical AI Analyst. Get a free key at openrouter.ai'),
    h('input', { id: 'or-key-inp', cls: 'inp', type: 'password', placeholder: 'sk-or-v1-...', value: settings.openrouter_key || '', style: { marginBottom: '14px' } }),
    h('div', { style: { display: 'flex', gap: '10px' } },
      h('button', { cls: 'btn-neon tap', style: { flex: 1 }, onClick: () => {
        const k = document.getElementById('or-key-inp')?.value?.trim() || '';
        saveSettings({ openrouter_key: k });
        // Show saved feedback
        const btn = document.querySelector('#or-save-btn');
        if (btn) { btn.textContent = '✓ Saved!'; setTimeout(() => { state.view = null; render(); }, 600); }
      }}, 'Save Key'),

  // Key status
